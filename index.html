<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Explorer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'DM Sans', sans-serif; }
        .drop-active { border-color: #818cf8 !important; background: rgba(129,140,248,0.06) !important; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0f0f0f] min-h-screen">
    <div id="app"></div>
    <script>

    // ── Math helpers ──────────────────────────────────────────────────────────

    function fmtNum(n, d = 2) {
        if (n === null || n === undefined || isNaN(n)) return '—';
        const abs = Math.abs(n);
        if (abs >= 1e9) return (n / 1e9).toFixed(1) + 'B';
        if (abs >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (abs >= 1e4) return Math.round(n).toLocaleString();
        return Number(n.toFixed(d)).toString();
    }

    function pct(n) { return (n * 100).toFixed(1) + '%'; }

    function mean(a)   { return a.reduce((s, x) => s + x, 0) / a.length; }
    function median(a) {
        const s = [...a].sort((x, y) => x - y), m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
    }
    function std(a) {
        const m = mean(a);
        return Math.sqrt(a.reduce((s, x) => s + (x - m) ** 2, 0) / a.length);
    }
    function quantile(a, q) {
        const s = [...a].sort((x, y) => x - y);
        const pos = (s.length - 1) * q, lo = Math.floor(pos), hi = Math.ceil(pos);
        return s[lo] + (s[hi] !== undefined ? s[hi] - s[lo] : 0) * (pos - lo);
    }
    function skew(a) {
        const m = mean(a), s = std(a);
        if (s === 0) return 0;
        return a.reduce((r, x) => r + ((x - m) / s) ** 3, 0) / a.length;
    }
    function pearson(x, y) {
        const mx = mean(x), my = mean(y);
        let n = 0, dx = 0, dy = 0;
        for (let i = 0; i < x.length; i++) {
            n  += (x[i] - mx) * (y[i] - my);
            dx += (x[i] - mx) ** 2;
            dy += (y[i] - my) ** 2;
        }
        return dx === 0 || dy === 0 ? 0 : n / Math.sqrt(dx * dy);
    }

    function toNum(val) {
        if (val === null || val === undefined || val === '') return NaN;
        const s = String(val).toLowerCase();
        if (['true','yes','y','1'].includes(s)) return 1;
        if (['false','no','n','0'].includes(s)) return 0;
        return +val;
    }

    // ── Header detection ─────────────────────────────────────────────────────

    function detectHeader(rows) {
        if (rows.length < 2) return true;
        const firstRow = rows[0];
        const sample   = rows.slice(1, Math.min(11, rows.length));
        const dateRx   = /^\d{4}-\d{2}-\d{2}$|^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/;
        const boolSet  = new Set(['true','false','yes','no','y','n','0','1']);

        for (let i = 0; i < firstRow.length; i++) {
            const first = String(firstRow[i] ?? '').trim();
            const isNum  = first !== '' && !isNaN(+first);
            const isBool = boolSet.has(first.toLowerCase());
            const isDate = dateRx.test(first);
            if (!(isNum || isBool || isDate)) continue;

            const rest = sample.map(r => String(r[i] ?? '').trim()).filter(v => v !== '');
            if (!rest.length) continue;
            const matches = rest.filter(v =>
                (isNum  && !isNaN(+v)) ||
                (isBool && boolSet.has(v.toLowerCase())) ||
                (isDate && dateRx.test(v))
            ).length;
            if (matches / rest.length > 0.7) return false;
        }
        return true;
    }

    function detectIndexColumn(columns, data) {
        if (!columns.length || !data.length) return false;
        const col  = columns[0];
        const vals = data.map(r => r[col]);
        if (!vals.every(v => v !== '' && !isNaN(+v) && Number.isInteger(+v))) return false;
        const nums  = vals.map(Number);
        const start = nums[0];
        if (start !== 0 && start !== 1) return false;
        return nums.every((n, i) => n === start + i);
    }

    // ── Type detection ────────────────────────────────────────────────────────

    function detectType(values) {
        const nn = values.filter(v => v !== null && v !== undefined && v !== '');
        if (!nn.length) return 'empty';
        const bools = new Set(['true','false','yes','no','y','n','0','1']);
        if (nn.every(v => bools.has(String(v).toLowerCase()))) return 'boolean';
        if (nn.every(v => v !== '' && !isNaN(+v))) return 'numeric';
        const dateRx = /^\d{4}-\d{2}-\d{2}$|^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/;
        if (nn.every(v => dateRx.test(String(v).trim()))) return 'date';
        return 'categorical';
    }

    // ── Analysis ──────────────────────────────────────────────────────────────

    function analyze(data, columns) {
        const types = {}, stats = {};
        columns.forEach(col => {
            const vals  = data.map(r => r[col]);
            const type  = detectType(vals);
            types[col]  = type;
            const nulls = vals.filter(v => v === null || v === undefined || v === '').length;
            const nn    = vals.filter(v => v !== null && v !== undefined && v !== '');
            const unique = new Set(nn.map(String)).size;
            const base  = { total: vals.length, nulls, nullPct: nulls / vals.length, unique };

            if (type === 'numeric') {
                const nums = nn.map(Number).filter(n => !isNaN(n));
                const q1 = quantile(nums, 0.25), q3 = quantile(nums, 0.75);
                const iqr = q3 - q1;
                const outliers = nums.filter(n => n < q1 - 1.5 * iqr || n > q3 + 1.5 * iqr);
                stats[col] = {
                    ...base, type, nums,
                    mean: mean(nums), median: median(nums), std: std(nums),
                    min: Math.min(...nums), max: Math.max(...nums),
                    q1, q3, skewness: skew(nums),
                    outlierCount: outliers.length,
                    outlierPct: outliers.length / nums.length,
                };
            } else {
                const counts = {};
                nn.forEach(v => { const k = String(v); counts[k] = (counts[k] || 0) + 1; });
                const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                stats[col] = { ...base, type, top, mode: top[0] ?? null };
            }
        });
        return { types, stats };
    }

    function corrMatrix(data, numCols) {
        const mat = {};
        numCols.forEach(c1 => {
            mat[c1] = {};
            numCols.forEach(c2 => {
                const pairs = data
                    .map(r => [toNum(r[c1]), toNum(r[c2])])
                    .filter(([a, b]) => !isNaN(a) && !isNaN(b));
                mat[c1][c2] = pairs.length < 2 ? null
                    : pearson(pairs.map(p => p[0]), pairs.map(p => p[1]));
            });
        });
        return mat;
    }

    function genInsights(columns, types, stats, corr, numCols) {
        const out = [];

        // Missing values
        columns.forEach(col => {
            if (stats[col].nullPct > 0.5)
                out.push({ lvl: 'error', msg: `<b>${col}</b>: ${pct(stats[col].nullPct)} missing values (${stats[col].nulls.toLocaleString()} rows)` });
            else if (stats[col].nullPct > 0.2)
                out.push({ lvl: 'warn',  msg: `<b>${col}</b>: ${pct(stats[col].nullPct)} missing values (${stats[col].nulls.toLocaleString()} rows)` });
        });

        // Constant columns
        columns.forEach(col => {
            if (stats[col].unique === 1)
                out.push({ lvl: 'warn', msg: `<b>${col}</b> has only one unique value — not useful for analysis` });
        });

        // ID columns
        columns.forEach(col => {
            const nonNullCount = stats[col].total - stats[col].nulls;
            if (stats[col].unique === nonNullCount && nonNullCount > 20)
                out.push({ lvl: 'info', msg: `<b>${col}</b> has all unique values — likely an ID column` });
        });

        // Outliers
        columns.forEach(col => {
            if (types[col] === 'numeric' && stats[col].outlierPct > 0.05)
                out.push({ lvl: 'warn', msg: `<b>${col}</b> has ${stats[col].outlierCount.toLocaleString()} outliers (${pct(stats[col].outlierPct)}) based on 1.5× IQR` });
        });

        // Skewness
        columns.forEach(col => {
            if (types[col] === 'numeric' && Math.abs(stats[col].skewness) > 2)
                out.push({ lvl: 'info', msg: `<b>${col}</b> is heavily ${stats[col].skewness > 0 ? 'right' : 'left'}-skewed (skewness: ${fmtNum(stats[col].skewness)})` });
        });

        // High correlations
        for (let i = 0; i < numCols.length; i++) {
            for (let j = i + 1; j < numCols.length; j++) {
                const r = corr[numCols[i]]?.[numCols[j]];
                if (r !== null && r !== undefined && Math.abs(r) > 0.8)
                    out.push({ lvl: 'info', msg: `<b>${numCols[i]}</b> and <b>${numCols[j]}</b> are highly correlated (r = ${fmtNum(r)})` });
            }
        }

        return out;
    }

    function detectTarget(columns, types, stats) {
        if (columns.length < 2) return null;

        const classNames = ['target','label','class','y','output','outcome','result','response',
            'survived','churn','default','fraud','diagnosis','species','category','type',
            'status','flag','indicator','decision','pass','fail','passed','failed','approved'];
        const regNames   = ['price','score','value','amount','salary','cost','revenue','sales',
            'income','rate','total','sum','quantity','age','duration','weight','height',
            'temperature','rating','fare','tip','charges','bmi','loss','error','wage','rent'];

        let best = null, bestScore = 0;

        columns.forEach((col, idx) => {
            const type = types[col];
            const stat = stats[col];
            if (type === 'empty' || type === 'date') return;
            if (stat.nullPct > 0.5) return;

            const name = col.toLowerCase().replace(/[\s_\-]/g, '');
            let score = 0, taskType = null;

            if (classNames.some(k => name === k || name.endsWith(k) || name.startsWith(k)))
                { score += 5; taskType = 'classification'; }
            else if (regNames.some(k => name === k || name.endsWith(k) || name.startsWith(k)))
                { score += 5; taskType = 'regression'; }

            if (type === 'boolean')
                { score += 3; taskType = taskType || 'classification'; }
            else if (type === 'categorical' && stat.unique <= 2)
                { score += 3; taskType = taskType || 'classification'; }
            else if (type === 'categorical' && stat.unique <= 10)
                { score += 2; taskType = taskType || 'classification'; }
            else if (type === 'numeric')
                { score += 1; taskType = taskType || 'regression'; }

            if (idx === columns.length - 1) score += 2;

            if (score > bestScore && taskType) {
                bestScore = score;
                let detail = '', subType = null;
                if (taskType === 'classification') {
                    subType  = stat.unique === 2 ? 'Binary' : `${stat.unique}-class`;
                    const cls = (stat.top || []).slice(0, 5).map(([v]) => `"${v}"`).join(', ');
                    detail = `${stat.unique} classes: ${cls}`;
                } else {
                    detail = `Range: ${fmtNum(stat.min)} – ${fmtNum(stat.max)}`;
                }
                const confidence = score >= 7 ? 'high' : score >= 5 ? 'moderate' : 'low';
                best = { col, taskType, subType, detail, confidence };
            }
        });

        return bestScore >= 3 ? best : null;
    }

    function cramersV(x, y) {
        const n = x.length;
        if (n < 2) return 0;
        const rowCats = [...new Set(x)], colCats = [...new Set(y)];
        if (rowCats.length < 2 || colCats.length < 2) return 0;
        const table = {};
        rowCats.forEach(r => { table[r] = {}; colCats.forEach(c => table[r][c] = 0); });
        for (let i = 0; i < n; i++) table[x[i]][y[i]]++;
        const rowTotals = rowCats.map(r => colCats.reduce((s, c) => s + table[r][c], 0));
        const colTotals = colCats.map(c => rowCats.reduce((s, r) => s + table[r][c], 0));
        let chi2 = 0;
        rowCats.forEach((r, ri) => colCats.forEach((c, ci) => {
            const e = rowTotals[ri] * colTotals[ci] / n;
            if (e > 0) chi2 += (table[r][c] - e) ** 2 / e;
        }));
        const k = Math.min(rowCats.length, colCats.length);
        return Math.sqrt(chi2 / (n * (k - 1)));
    }

    function eta(numVals, catVals) {
        const grandMean = mean(numVals);
        const sst = numVals.reduce((s, v) => s + (v - grandMean) ** 2, 0);
        if (sst === 0) return 0;
        const cats = [...new Set(catVals)];
        const ssb = cats.reduce((s, cat) => {
            const g = numVals.filter((_, i) => catVals[i] === cat);
            return s + g.length * (mean(g) - grandMean) ** 2;
        }, 0);
        return Math.sqrt(ssb / sst);
    }

    function featureImportance(data, columns, types, stats, target) {
        const tCol  = target.col;
        const tStrs = data.map(r => String(r[tCol] ?? ''));
        const tNums = data.map(r => toNum(r[tCol]));
        const uniqueTargets = [...new Set(tStrs.filter(v => v !== ''))];
        const isBinary = uniqueTargets.length === 2;
        const tEnc  = isBinary ? tStrs.map(v => v === uniqueTargets[0] ? 0 : 1) : null;

        return columns
            .filter(c => c !== tCol && types[c] !== 'empty' && types[c] !== 'date')
            .map(col => {
                const type = types[col];
                let score = 0, method = '';

                if (type === 'numeric' || type === 'boolean') {
                    const fNums = data.map(r => toNum(r[col]));
                    if (target.taskType === 'regression') {
                        const pairs = fNums.map((n, i) => [n, tNums[i]]).filter(([a, b]) => !isNaN(a) && !isNaN(b));
                        if (pairs.length >= 2) { score = Math.abs(pearson(pairs.map(p => p[0]), pairs.map(p => p[1]))); method = '|r|'; }
                    } else if (isBinary) {
                        const pairs = fNums.map((n, i) => [n, tEnc[i]]).filter(([a]) => !isNaN(a));
                        if (pairs.length >= 2) { score = Math.abs(pearson(pairs.map(p => p[0]), pairs.map(p => p[1]))); method = '|r|'; }
                    } else {
                        const valid = fNums.map((n, i) => [n, tStrs[i]]).filter(([n, t]) => !isNaN(n) && t !== '');
                        if (valid.length >= 2) { score = eta(valid.map(p => p[0]), valid.map(p => p[1])); method = 'η'; }
                    }
                } else if (type === 'categorical') {
                    const st = stats ? stats[col] : null;
                    if (st && st.unique > 20) { return { col, type, score: 0, method: '' }; }
                    const fStrs = data.map(r => String(r[col] ?? ''));
                    const valid = fStrs.map((s, i) => [s, tStrs[i]]).filter(([a, b]) => a !== '' && b !== '');
                    if (valid.length >= 2) { score = cramersV(valid.map(p => p[0]), valid.map(p => p[1])); method = 'V'; }
                }
                return { col, type, score, method };
            })
            .filter(f => f.score > 0)
            .sort((a, b) => b.score - a.score);
    }

    function encodeAbility(columns, types, stats, target) {
        return columns.map(col => {
            const type    = types[col];
            const stat    = stats[col];
            const nonNull = stat.total - stat.nulls;
            const allUniq = stat.unique === nonNull && nonNull > 20;
            const isTarget = target && col === target.col;
            const nullNote = stat.nulls > 0 ? `impute ${stat.nulls.toLocaleString()} missing` : '';

            let action, note, level;

            if (type === 'empty') {
                action = 'Drop'; note = 'No data'; level = 'drop';
            } else if (type === 'numeric' && allUniq) {
                action = 'Drop'; note = `All unique — likely ID${nullNote ? ' · ' + nullNote : ''}`; level = 'drop';
            } else if (type === 'numeric') {
                action = 'Ready'; note = nullNote; level = 'ready';
            } else if (type === 'boolean') {
                action = 'Map to 0 / 1'; note = nullNote; level = 'encode';
            } else if (type === 'date') {
                action = 'Extract features'; note = `Year, month, day, weekday${nullNote ? ' · ' + nullNote : ''}`; level = 'encode';
            } else if (type === 'categorical') {
                if (allUniq) {
                    action = 'Drop'; note = `All unique — likely ID${nullNote ? ' · ' + nullNote : ''}`; level = 'drop';
                } else if (isTarget) {
                    action = stat.unique === 2 ? 'Map to 0 / 1' : 'Label encode';
                    note = `Target · ${stat.unique} classes${nullNote ? ' · ' + nullNote : ''}`;
                    level = 'encode';
                } else if (stat.unique === 2) {
                    action = 'Map to 0 / 1'; note = `2 categories → 1 col${nullNote ? ' · ' + nullNote : ''}`; level = 'encode';
                } else if (stat.unique <= 20) {
                    action = 'One-hot encode'; note = `${stat.unique} categories → ${stat.unique} cols${nullNote ? ' · ' + nullNote : ''}`; level = 'encode';
                } else {
                    action = 'High cardinality'; note = `${stat.unique} unique — target encode or drop${nullNote ? ' · ' + nullNote : ''}`; level = 'warn';
                }
            }

            return { col, type, action, note, level, isTarget };
        });
    }

    // ── Rendering ─────────────────────────────────────────────────────────────

    function resetApp() { renderUpload(); }

    function renderUpload() {
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex flex-col items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="text-center mb-8">
                        <div class="text-6xl mb-4">📊</div>
                        <h1 class="text-3xl font-bold text-white mb-2">CSV Explorer</h1>
                        <p class="text-white/40">Instant exploratory data analysis in your browser</p>
                    </div>
                    <div id="dropzone" class="border-2 border-dashed border-white/20 rounded-2xl p-12 text-center cursor-pointer hover:border-white/40 transition-all">
                        <div class="text-4xl mb-3">📂</div>
                        <p class="text-white/70 font-semibold mb-1">Drop your CSV here</p>
                        <p class="text-white/30 text-sm">or click to browse</p>
                        <input type="file" id="file-input" accept=".csv" class="hidden">
                    </div>
                    <p class="text-center text-white/20 text-xs mt-4">🔒 Your data never leaves your browser</p>
                </div>
            </div>
        `;
        setupDropzone();
    }

    function setupDropzone() {
        const dz = document.getElementById('dropzone');
        const fi = document.getElementById('file-input');
        dz.addEventListener('click', () => fi.click());
        fi.addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
        dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drop-active'); });
        dz.addEventListener('dragleave', ()  => dz.classList.remove('drop-active'));
        dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('drop-active');
            const f = e.dataTransfer.files[0];
            if (f && f.name.toLowerCase().endsWith('.csv')) loadFile(f);
        });
    }

    function loadFile(file) {
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex items-center justify-center">
                <div class="text-center">
                    <div class="spinner mx-auto mb-4"></div>
                    <p class="text-white/50">Analyzing ${file.name}…</p>
                </div>
            </div>
        `;
        Papa.parse(file, {
            header: false,
            skipEmptyLines: true,
            dynamicTyping: false,
            complete: result => {
                const rows = result.data;
                if (!rows.length) return;

                const hasHeader = detectHeader(rows);
                let columns, data;
                if (hasHeader) {
                    columns = rows[0].map(String);
                    data = rows.slice(1).map(row => Object.fromEntries(columns.map((col, i) => [col, row[i] ?? ''])));
                } else {
                    columns = Array.from({ length: rows[0].length }, (_, i) => `Column ${i + 1}`);
                    data = rows.map(row => Object.fromEntries(columns.map((col, i) => [col, row[i] ?? ''])));
                }

                let droppedIndex = false;
                if (detectIndexColumn(columns, data)) {
                    const idxCol = columns[0];
                    data    = data.map(row => { const r = { ...row }; delete r[idxCol]; return r; });
                    columns = columns.slice(1);
                    droppedIndex = true;
                }

                const { types, stats } = analyze(data, columns);
                const numCols  = columns.filter(c => types[c] === 'numeric');
                const plotCols = columns.filter(c => types[c] === 'numeric' || types[c] === 'boolean');
                const catCols  = columns.filter(c => types[c] === 'categorical');
                const corr     = plotCols.length >= 2 ? corrMatrix(data, plotCols) : {};
                const insights = genInsights(columns, types, stats, corr, numCols);
                const target   = detectTarget(columns, types, stats);
                renderAnalysis(file.name, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex, target);
            },
            error: err => {
                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen flex items-center justify-center">
                        <p class="text-red-400">Error parsing file: ${err.message}</p>
                    </div>
                `;
            }
        });
    }

    function typeBadge(type) {
        const styles = {
            numeric:     'bg-blue-100 text-blue-700',
            categorical: 'bg-purple-100 text-purple-700',
            boolean:     'bg-green-100 text-green-700',
            date:        'bg-orange-100 text-orange-700',
            empty:       'bg-gray-100 text-gray-400',
        };
        return `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${styles[type] || 'bg-gray-100 text-gray-400'}">${type}</span>`;
    }

    function statBox(label, value) {
        return `<div><div class="text-xs text-gray-400 mb-0.5">${label}</div><div class="font-semibold text-gray-800 text-sm">${value}</div></div>`;
    }

    function renderAnalysis(filename, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex, target) {
        const typeCounts = {};
        columns.forEach(c => { typeCounts[types[c]] = (typeCounts[types[c]] || 0) + 1; });
        const typeIcons  = { numeric: '🔢', categorical: '🔤', boolean: '✅', date: '📅', empty: '⬜' };
        const pairHeight = Math.min(plotCols.length, 8) * 160 + 40;
        const corrHeight = Math.max(320, plotCols.length * 44 + 120);

        const featureImp    = target ? featureImportance(data, columns, types, stats, target) : [];
        const featureImpNum = featureImp.filter(f => f.type === 'numeric' || f.type === 'boolean');
        const featureImpCat = featureImp.filter(f => f.type === 'categorical');
        const encSummary  = encodeAbility(columns, types, stats, target);
        const imbalance  = (() => {
            if (!target || target.taskType !== 'classification') return null;
            const st    = stats[target.col];
            const total = st.total - st.nulls;
            const top   = (st.top || []).map(([v, n]) => ({ v, n, pct: n / total }));
            const max   = top[0]?.pct ?? 0;
            return { top, maxPct: max, level: max > 0.9 ? 'severe' : max > 0.7 ? 'moderate' : 'balanced' };
        })();

        document.getElementById('app').innerHTML = `
            <!-- Sticky header -->
            <div class="sticky top-0 z-50 bg-[#0f0f0f]/95 backdrop-blur border-b border-white/10">
                <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3 min-w-0">
                        <button onclick="resetApp()" class="text-white/40 hover:text-white transition text-sm shrink-0">← Back</button>
                        <span class="text-white font-semibold truncate">${filename}</span>
                    </div>
                    <div class="flex gap-4 text-sm text-white/50 shrink-0">
                        <span><span class="text-white font-semibold">${data.length.toLocaleString()}</span> rows</span>
                        <span><span class="text-white font-semibold">${columns.length}</span> cols</span>
                    </div>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-4 py-8 space-y-10">

                <!-- No-header / dropped-index notices -->
                ${!hasHeader || droppedIndex ? `<div class="space-y-2">
                    ${!hasHeader ? `
                    <div class="flex items-start gap-3 rounded-xl px-4 py-3 bg-amber-950/50 border border-amber-500/20">
                        <span class="shrink-0">🟡</span>
                        <span class="text-sm text-white/80">No header row detected — columns have been assigned generic names (Column 1, Column 2, …)</span>
                    </div>` : ''}
                    ${droppedIndex ? `
                    <div class="flex items-start gap-3 rounded-xl px-4 py-3 bg-amber-950/50 border border-amber-500/20">
                        <span class="shrink-0">🟡</span>
                        <span class="text-sm text-white/80">First column looked like a row index (0, 1, 2, …) and was removed</span>
                    </div>` : ''}
                </div>` : ''}

                <!-- Insights -->
                ${insights.length ? `
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">💡 Insights</h2>
                    <div class="space-y-2">
                        ${insights.map(i => `
                            <div class="flex items-start gap-3 rounded-xl px-4 py-3 ${
                                i.lvl === 'error' ? 'bg-red-950/50 border border-red-500/20' :
                                i.lvl === 'warn'  ? 'bg-amber-950/50 border border-amber-500/20' :
                                                    'bg-white/5 border border-white/10'
                            }">
                                <span class="shrink-0">${i.lvl === 'error' ? '🔴' : i.lvl === 'warn' ? '🟡' : '🔵'}</span>
                                <span class="text-sm text-white/80">${i.msg}</span>
                            </div>
                        `).join('')}
                    </div>
                </section>` : ''}

                <!-- Suggested ML task -->
                ${target ? `
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">🎯 Suggested ML Task</h2>
                    <div class="bg-white rounded-xl shadow-sm p-4 flex items-start gap-4">
                        <div class="text-3xl shrink-0">${target.taskType === 'classification' ? '🏷️' : '📈'}</div>
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center gap-2 flex-wrap mb-1">
                                <span class="font-semibold text-gray-800">${target.taskType === 'classification' ? 'Classification' : 'Regression'}</span>
                                ${target.subType ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${target.taskType === 'classification' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">${target.subType}</span>` : ''}
                                <span class="text-xs font-medium px-2 py-0.5 rounded-full ${target.confidence === 'high' ? 'bg-green-100 text-green-700' : target.confidence === 'moderate' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-400'}">${target.confidence} confidence</span>
                            </div>
                            <div class="text-sm text-gray-600">Predicted column: <span class="font-semibold text-gray-800">${target.col}</span></div>
                            <div class="text-xs text-gray-400 mt-0.5">${target.detail}</div>
                            ${imbalance ? `
                            <div class="mt-3 pt-3 border-t border-gray-100">
                                <div class="flex h-2.5 rounded-full overflow-hidden gap-px mb-1.5">
                                    ${imbalance.top.map((c, i) => {
                                        const colors = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];
                                        return `<div style="width:${c.pct*100}%;background:${colors[i%colors.length]}" title="${c.v}: ${(c.pct*100).toFixed(1)}%"></div>`;
                                    }).join('')}
                                </div>
                                <div class="flex flex-wrap gap-x-3 gap-y-0.5">
                                    ${imbalance.top.slice(0, 6).map((c, i) => {
                                        const colors = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];
                                        return `<span class="text-xs text-gray-500"><span style="color:${colors[i%colors.length]}">●</span> ${c.v} ${(c.pct*100).toFixed(1)}%</span>`;
                                    }).join('')}
                                </div>
                                ${imbalance.level !== 'balanced' ? `
                                <div class="text-xs mt-1.5 ${imbalance.level === 'severe' ? 'text-red-500' : 'text-amber-500'}">
                                    ⚠ ${imbalance.level === 'severe' ? 'Severely' : 'Moderately'} imbalanced — majority class is ${(imbalance.maxPct*100).toFixed(1)}%
                                </div>` : ''}
                            </div>` : ''}
                        </div>
                    </div>
                </section>` : ''}

                <!-- Overview -->
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">📋 Overview</h2>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
                        ${Object.entries(typeCounts).map(([type, count]) => `
                            <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                                <div class="text-2xl font-bold text-white">${count}</div>
                                <div class="text-sm text-white/50">${typeIcons[type] || ''} ${type}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-4">
                        <div class="text-sm font-semibold text-gray-500 mb-3">Missing values per column</div>
                        <div id="missing-chart" style="height:200px"></div>
                    </div>
                </section>

                <!-- Sample data -->
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">🗂 Sample Data <span class="text-white/30 font-normal text-sm">(first 10 rows)</span></h2>
                    <div class="bg-white rounded-xl shadow-sm overflow-auto">
                        <table class="text-sm w-full">
                            <thead>
                                <tr class="border-b border-gray-100">
                                    ${columns.map(col => `<th class="text-left text-xs font-semibold text-gray-400 px-3 py-2 whitespace-nowrap">${col}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${data.slice(0, 10).map((row, i) => `
                                    <tr class="${i % 2 === 0 ? '' : 'bg-gray-50'} border-b border-gray-50 last:border-0">
                                        ${columns.map(col => `<td class="px-3 py-1.5 text-gray-700 whitespace-nowrap max-w-xs truncate" title="${row[col] ?? ''}">${row[col] ?? '<span class=\'text-gray-300\'>null</span>'}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Column profiles -->
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">🔍 Column Profiles</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                        ${columns.map((col, idx) => {
                            if (stats[col].unique === stats[col].total - stats[col].nulls) return '';
                            return `
                            <div class="bg-white rounded-xl shadow-sm p-4">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="font-semibold text-gray-800 truncate mr-2 text-sm" title="${col}">${col}</span>
                                    ${typeBadge(types[col])}
                                </div>
                                ${types[col] === 'numeric'
                                    ? `<div id="col-hist-${idx}" style="height:130px"></div>
                                       <div id="col-box-${idx}" style="height:80px"></div>`
                                    : stats[col].unique <= 20
                                        ? `<div id="col-chart-${idx}" style="height:150px"></div>`
                                        : `<div class="flex items-center justify-center text-xs text-gray-300 mb-1" style="height:40px">${stats[col].unique.toLocaleString()} unique values</div>`
                                }
                                <div class="grid grid-cols-3 gap-x-3 gap-y-2 mt-3 pt-3 border-t border-gray-100">
                                    ${types[col] === 'numeric' ? `
                                        ${statBox('Mean',     fmtNum(stats[col].mean))}
                                        ${statBox('Median',   fmtNum(stats[col].median))}
                                        ${statBox('Std',      fmtNum(stats[col].std))}
                                        ${statBox('Min',      fmtNum(stats[col].min))}
                                        ${statBox('Max',      fmtNum(stats[col].max))}
                                        ${statBox('Nulls',    pct(stats[col].nullPct))}
                                    ` : `
                                        ${statBox('Mode', (() => {
                                            const m = stats[col].mode;
                                            if (!m) return '—';
                                            const tied = stats[col].top.length > 1 && stats[col].top[0][1] === stats[col].top[1][1];
                                            if (tied) return '—';
                                            const v = String(m[0]);
                                            return v.length > 12 ? v.slice(0, 10) + '…' : v;
                                        })())}
                                        ${statBox('Unique',  stats[col].unique.toLocaleString())}
                                        ${statBox('Nulls',   pct(stats[col].nullPct))}
                                    `}
                                </div>
                                ${types[col] === 'numeric' && stats[col].outlierCount > 0 ? `
                                    <div class="text-xs mt-2 text-amber-600">⚠ ${stats[col].outlierCount.toLocaleString()} outliers (${pct(stats[col].outlierPct)})</div>
                                ` : ''}
                            </div>
                        `;
                        }).join('')}
                    </div>
                </section>

                <!-- Correlations -->
                ${plotCols.length >= 2 ? `
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">🔗 Correlation Heatmap</h2>
                    <div class="bg-white rounded-xl shadow-sm p-4">
                        <div id="corr-chart" style="height:${corrHeight}px"></div>
                    </div>
                </section>` : ''}

                <!-- Feature importance -->
                ${featureImp.length ? `
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">📊 Feature Importance <span class="text-white/30 font-normal text-sm">vs ${target.col}</span></h2>
                    <div class="grid grid-cols-1 ${featureImpNum.length && featureImpCat.length ? 'md:grid-cols-2' : ''} gap-4">
                        ${featureImpNum.length ? `
                        <div class="bg-white rounded-xl shadow-sm p-4">
                            <div class="text-sm font-semibold text-gray-600 mb-1">Numeric &amp; Boolean</div>
                            <div class="text-xs text-gray-400 mb-2">|r| Pearson correlation or η correlation ratio</div>
                            <div id="feat-imp-num" style="height:${Math.max(160, featureImpNum.length * 28 + 60)}px"></div>
                        </div>` : ''}
                        ${featureImpCat.length ? `
                        <div class="bg-white rounded-xl shadow-sm p-4">
                            <div class="text-sm font-semibold text-gray-600 mb-1">Categorical</div>
                            <div class="text-xs text-gray-400 mb-2">V Cramér's V (columns with ≤20 unique values)</div>
                            <div id="feat-imp-cat" style="height:${Math.max(160, featureImpCat.length * 28 + 60)}px"></div>
                        </div>` : ''}
                    </div>
                </section>` : ''}

                <!-- Encode-ability summary -->
                <section>
                    <h2 class="text-base font-semibold text-white mb-3">📦 Encode-ability Summary</h2>
                    ${(() => {
                        const counts = { ready: 0, encode: 0, warn: 0, drop: 0 };
                        encSummary.forEach(r => counts[r.level]++);
                        const badges = [
                            counts.ready  ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-700">${counts.ready} ready</span>` : '',
                            counts.encode ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">${counts.encode} need encoding</span>` : '',
                            counts.warn   ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700">${counts.warn} high cardinality</span>` : '',
                            counts.drop   ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full bg-red-100 text-red-700">${counts.drop} to drop</span>` : '',
                        ].filter(Boolean).join('');
                        return `<div class="flex flex-wrap gap-2 mb-3">${badges}</div>`;
                    })()}
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                        <table class="text-sm w-full">
                            <thead>
                                <tr class="border-b border-gray-100">
                                    <th class="text-left text-xs font-semibold text-gray-400 px-3 py-2">Column</th>
                                    <th class="text-left text-xs font-semibold text-gray-400 px-3 py-2">Type</th>
                                    <th class="text-left text-xs font-semibold text-gray-400 px-3 py-2">Action</th>
                                    <th class="text-left text-xs font-semibold text-gray-400 px-3 py-2 hidden sm:table-cell">Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${encSummary.map((row, i) => {
                                    const actionStyle = {
                                        ready:  'bg-green-50 text-green-700',
                                        encode: 'bg-blue-50 text-blue-700',
                                        warn:   'bg-yellow-50 text-yellow-700',
                                        drop:   'bg-red-50 text-red-600',
                                    }[row.level];
                                    return `
                                    <tr class="${i % 2 === 0 ? '' : 'bg-gray-50'} border-b border-gray-50 last:border-0">
                                        <td class="px-3 py-2 font-medium text-gray-800 whitespace-nowrap">
                                            ${row.col}${row.isTarget ? ' <span class="text-xs text-purple-500">(target)</span>' : ''}
                                        </td>
                                        <td class="px-3 py-2">${typeBadge(row.type)}</td>
                                        <td class="px-3 py-2 whitespace-nowrap">
                                            <span class="text-xs font-medium px-2 py-0.5 rounded-full ${actionStyle}">${row.action}</span>
                                        </td>
                                        <td class="px-3 py-2 text-xs text-gray-400 hidden sm:table-cell">${row.note || '—'}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Pair plot -->
                ${plotCols.length >= 2 ? `
                <section>
                    <h2 class="text-base font-semibold text-white mb-1">⚡ Pair Plot</h2>
                    ${plotCols.length > 8 ? `<p class="text-white/40 text-sm mb-3">Showing first 8 numeric/boolean columns</p>` : `<p class="text-white/40 text-sm mb-3">${plotCols.length} numeric/boolean columns</p>`}
                    ${data.length > 5000 ? `<p class="text-white/30 text-xs mb-3">Sampled to 5,000 rows for performance</p>` : ''}
                    <div class="bg-white rounded-xl shadow-sm p-4">
                        <div id="pair-plot" style="height:${pairHeight}px"></div>
                    </div>
                </section>` : ''}

                <div class="pb-8"></div>
            </div>
        `;

        // Render Plotly charts after DOM is set
        const CFG = { displayModeBar: false, responsive: true };

        setTimeout(() => {
            // Missing values chart
            const colsWithMissing = columns.filter(c => stats[c].nulls > 0);
            const missingCols  = colsWithMissing.length ? colsWithMissing : columns.slice(0, 30);
            const missingVals  = missingCols.map(c => stats[c].nullPct * 100);
            Plotly.newPlot('missing-chart', [{
                type: 'bar', orientation: 'h',
                y: missingCols, x: missingVals,
                marker: { color: missingVals.map(v => v > 50 ? '#ef4444' : v > 20 ? '#f59e0b' : '#6366f1') },
                text: missingVals.map(v => v.toFixed(1) + '%'),
                textposition: 'outside',
            }], {
                margin: { t: 5, r: 55, b: 20, l: 130 },
                xaxis: { range: [0, 110], ticksuffix: '%', color: '#9ca3af', gridcolor: '#f3f4f6' },
                yaxis: { color: '#374151', automargin: true },
                paper_bgcolor: 'white', plot_bgcolor: 'white',
                bargap: 0.35,
                annotations: colsWithMissing.length === 0 ? [{
                    text: '✓ No missing values', showarrow: false,
                    font: { color: '#16a34a', size: 14 }, xref: 'paper', yref: 'paper', x: 0.5, y: 0.5
                }] : [],
            }, CFG);

            // Column charts
            columns.forEach((col, idx) => {
                const el   = document.getElementById(`col-chart-${idx}`);
                const stat = stats[col];

                if (types[col] === 'numeric') {
                    const hist = document.getElementById(`col-hist-${idx}`);
                    const box  = document.getElementById(`col-box-${idx}`);
                    if (hist) Plotly.newPlot(hist, [{
                        type: 'histogram', x: stat.nums,
                        marker: { color: '#6366f1', opacity: 0.85 },
                        nbinsx: 30,
                    }], {
                        margin: { t: 5, r: 5, b: 25, l: 40 },
                        paper_bgcolor: 'white', plot_bgcolor: '#f9fafb',
                        xaxis: { color: '#9ca3af', gridcolor: '#f3f4f6' },
                        yaxis: { color: '#9ca3af', gridcolor: '#f3f4f6' },
                        showlegend: false,
                    }, CFG);
                    if (box) Plotly.newPlot(box, [{
                        type: 'box', x: stat.nums,
                        boxpoints: 'outliers',
                        marker: { color: '#6366f1', size: 3, opacity: 0.5 },
                        line: { color: '#6366f1' },
                        fillcolor: 'rgba(99,102,241,0.12)',
                    }], {
                        margin: { t: 5, r: 5, b: 20, l: 5 },
                        paper_bgcolor: 'white', plot_bgcolor: '#f9fafb',
                        xaxis: { color: '#9ca3af', gridcolor: '#f3f4f6' },
                        yaxis: { visible: false },
                        showlegend: false,
                    }, CFG);
                } else if (stat.unique <= 20) {
                    const labels = stat.top.map(([v]) => v.length > 15 ? v.slice(0, 13) + '…' : v);
                    const vals   = stat.top.map(([, n]) => n);
                    Plotly.newPlot(el, [{
                        type: 'bar',
                        x: labels, y: vals,
                        marker: { color: '#8b5cf6', opacity: 0.85 },
                    }], {
                        margin: { t: 5, r: 5, b: 50, l: 35 },
                        paper_bgcolor: 'white', plot_bgcolor: '#f9fafb',
                        xaxis: { color: '#374151', tickangle: -35, automargin: true },
                        yaxis: { color: '#9ca3af', gridcolor: '#f3f4f6' },
                        showlegend: false,
                    }, CFG);
                }
            });

            // Correlation heatmap
            if (plotCols.length >= 2) {
                const z    = plotCols.map(r => plotCols.map(c => corr[r][c]));
                const text = z.map(row => row.map(v => v === null ? '' : v.toFixed(2)));
                Plotly.newPlot('corr-chart', [{
                    type: 'heatmap', z, x: plotCols, y: plotCols,
                    colorscale: 'RdBu', reversescale: true, zmin: -1, zmax: 1,
                    text, texttemplate: '%{text}',
                    colorbar: { thickness: 14, len: 0.8 },
                }], {
                    margin: { t: 10, r: 80, b: 110, l: 110 },
                    paper_bgcolor: 'white', plot_bgcolor: 'white',
                    xaxis: { color: '#374151', tickangle: -40, automargin: true },
                    yaxis: { color: '#374151', automargin: true, autorange: 'reversed' },
                }, CFG);

                // Pair plot
                const pairCols = plotCols.slice(0, 8);
                let rows = data;
                if (data.length > 5000) {
                    const step = Math.ceil(data.length / 5000);
                    rows = data.filter((_, i) => i % step === 0);
                }
                Plotly.newPlot('pair-plot', [{
                    type: 'splom',
                    dimensions: pairCols.map(col => ({
                        label: col,
                        values: rows.map(r => toNum(r[col])),
                    })),
                    showupperhalf: false,
                    diagonal: { visible: true },
                    marker: { size: 3, opacity: 0.4, color: '#6366f1' },
                }], {
                    margin: { t: 10, r: 10, b: 10, l: 10 },
                    paper_bgcolor: 'white', plot_bgcolor: 'white',
                }, CFG);
            }

            // Feature importance
            const impLayout = {
                margin: { t: 5, r: 70, b: 30, l: 120 },
                xaxis: { range: [0, 1.15], color: '#9ca3af', gridcolor: '#f3f4f6' },
                yaxis: { color: '#374151', autorange: 'reversed', automargin: true },
                paper_bgcolor: 'white', plot_bgcolor: 'white',
                bargap: 0.35,
            };
            if (featureImpNum.length) {
                Plotly.newPlot('feat-imp-num', [{
                    type: 'bar', orientation: 'h',
                    y: featureImpNum.map(f => f.col),
                    x: featureImpNum.map(f => f.score),
                    marker: { color: featureImpNum.map(f => f.type === 'boolean' ? '#10b981' : '#6366f1') },
                    text: featureImpNum.map(f => f.score.toFixed(3)),
                    textposition: 'outside',
                    customdata: featureImpNum.map(f => f.method),
                    hovertemplate: '%{y}: %{x:.3f} (%{customdata})<extra></extra>',
                }], impLayout, CFG);
            }
            if (featureImpCat.length) {
                Plotly.newPlot('feat-imp-cat', [{
                    type: 'bar', orientation: 'h',
                    y: featureImpCat.map(f => f.col),
                    x: featureImpCat.map(f => f.score),
                    marker: { color: '#8b5cf6' },
                    text: featureImpCat.map(f => f.score.toFixed(3)),
                    textposition: 'outside',
                    customdata: featureImpCat.map(f => f.method),
                    hovertemplate: '%{y}: %{x:.3f} (%{customdata})<extra></extra>',
                }], impLayout, CFG);
            }
        }, 0);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    renderUpload();

    </script>
</body>
</html>
