<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analyzer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
        * { font-family: 'DM Sans', sans-serif; }
        .drop-active { border-color: #818cf8 !important; background: rgba(129,140,248,0.06) !important; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#0f0f0f] min-h-screen">
    <div id="app"></div>
    <script>

    // HTML-escape any value (incl. quotes, so it's safe in attributes) before it
    // goes into innerHTML. Used everywhere CSV-derived text is rendered.
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    // ── Math helpers ──────────────────────────────────────────────────────────

    function fmtNum(n, d = 2) {
        if (n === null || n === undefined || isNaN(n)) return '—';
        const abs = Math.abs(n);
        if (abs >= 1e9) return (n / 1e9).toFixed(1) + 'B';
        if (abs >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (abs >= 1e4) return Math.round(n).toLocaleString();
        return Number(n.toFixed(d)).toString();
    }

    function pct(n) { return (n * 100).toFixed(1) + '%'; }

    function mean(a)   { return a.reduce((s, x) => s + x, 0) / a.length; }
    function median(a) {
        const s = [...a].sort((x, y) => x - y), m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
    }
    function std(a) {
        const m = mean(a);
        return Math.sqrt(a.reduce((s, x) => s + (x - m) ** 2, 0) / a.length);
    }
    function quantile(a, q) {
        const s = [...a].sort((x, y) => x - y);
        const pos = (s.length - 1) * q, lo = Math.floor(pos), hi = Math.ceil(pos);
        return s[lo] + (s[hi] !== undefined ? s[hi] - s[lo] : 0) * (pos - lo);
    }
    function skew(a) {
        const m = mean(a), s = std(a);
        if (s === 0) return 0;
        return a.reduce((r, x) => r + ((x - m) / s) ** 3, 0) / a.length;
    }
    function pearson(x, y) {
        const mx = mean(x), my = mean(y);
        let n = 0, dx = 0, dy = 0;
        for (let i = 0; i < x.length; i++) {
            n  += (x[i] - mx) * (y[i] - my);
            dx += (x[i] - mx) ** 2;
            dy += (y[i] - my) ** 2;
        }
        return dx === 0 || dy === 0 ? 0 : n / Math.sqrt(dx * dy);
    }

    function toNum(val) {
        if (val === null || val === undefined || val === '') return NaN;
        const s = String(val).toLowerCase();
        if (['true','yes','y','1'].includes(s)) return 1;
        if (['false','no','n','0'].includes(s)) return 0;
        return +val;
    }

    // ── K-Means clustering ────────────────────────────────────────────────────

    function kMeansRun(X, k, maxIter = 100, restarts = 3) {
        const n = X.length, dims = X[0].length;
        if (k === 1) {
            const centroid = Array.from({ length: dims }, (_, j) => {
                let s = 0; for (const x of X) s += x[j]; return s / n;
            });
            const wcss = X.reduce((s, x) => {
                let d = 0; for (let j = 0; j < dims; j++) d += (x[j] - centroid[j]) ** 2; return s + d;
            }, 0);
            return { wcss, labels: new Array(n).fill(0), centroids: [centroid] };
        }
        let bestWcss = Infinity, bestLabels = null, bestCentroids = null;
        for (let r = 0; r < restarts; r++) {
            // k-means++ initialization
            const centroids = [X[Math.floor(Math.random() * n)].slice()];
            for (let ci = 1; ci < k; ci++) {
                const dists = X.map(x => {
                    let minD = Infinity;
                    for (const c of centroids) {
                        let d2 = 0;
                        for (let j = 0; j < dims; j++) d2 += (x[j] - c[j]) ** 2;
                        if (d2 < minD) minD = d2;
                    }
                    return minD;
                });
                const total = dists.reduce((s, v) => s + v, 0);
                let rnd = Math.random() * total, chosen = n - 1;
                for (let i = 0; i < n; i++) { rnd -= dists[i]; if (rnd <= 0) { chosen = i; break; } }
                centroids.push(X[chosen].slice());
            }
            // Lloyd's algorithm
            const labels = new Array(n).fill(0);
            for (let iter = 0; iter < maxIter; iter++) {
                let changed = false;
                for (let i = 0; i < n; i++) {
                    let minD = Infinity, minK = 0;
                    for (let ci = 0; ci < k; ci++) {
                        let d2 = 0;
                        for (let j = 0; j < dims; j++) d2 += (X[i][j] - centroids[ci][j]) ** 2;
                        if (d2 < minD) { minD = d2; minK = ci; }
                    }
                    if (labels[i] !== minK) { labels[i] = minK; changed = true; }
                }
                if (!changed) break;
                const sums = Array.from({ length: k }, () => new Array(dims).fill(0));
                const counts = new Array(k).fill(0);
                for (let i = 0; i < n; i++) {
                    counts[labels[i]]++;
                    for (let j = 0; j < dims; j++) sums[labels[i]][j] += X[i][j];
                }
                for (let ci = 0; ci < k; ci++)
                    if (counts[ci] > 0)
                        for (let j = 0; j < dims; j++) centroids[ci][j] = sums[ci][j] / counts[ci];
            }
            let wcss = 0;
            for (let i = 0; i < n; i++)
                for (let j = 0; j < dims; j++) wcss += (X[i][j] - centroids[labels[i]][j]) ** 2;
            if (wcss < bestWcss) {
                bestWcss = wcss;
                bestLabels = labels.slice();
                bestCentroids = centroids.map(c => c.slice());
            }
        }
        return { wcss: bestWcss, labels: bestLabels, centroids: bestCentroids };
    }

    function kMeansElbow(X, maxK) {
        const results = [];
        for (let k = 1; k <= maxK; k++) {
            const { wcss, labels, centroids } = kMeansRun(X, k);
            results.push({ k, wcss, labels, centroids });
        }
        return results;
    }

    function detectElbow(wcssArr) {
        const n = wcssArr.length;
        if (n < 3) return Math.min(2, n);
        // Kneedle method: normalize both axes to [0,1], find point furthest
        // below the chord connecting endpoints — scale-invariant and reliable.
        const yMax = wcssArr[0], yMin = wcssArr[n - 1];
        const yRange = yMax - yMin || 1;
        let maxDist = -Infinity, bestIdx = 1;
        for (let i = 1; i < n - 1; i++) {
            const knorm = i / (n - 1);
            const wnorm = (wcssArr[i] - yMin) / yRange;
            const dist  = 1 - knorm - wnorm; // distance below chord (positive = below)
            if (dist > maxDist) { maxDist = dist; bestIdx = i; }
        }
        return Math.max(2, Math.min(n, bestIdx + 1));
    }

    // ── Header detection ─────────────────────────────────────────────────────

    function detectHeader(rows) {
        if (rows.length < 2) return true;
        const firstRow = rows[0];
        const sample   = rows.slice(1, Math.min(11, rows.length));
        const dateRx   = /^\d{4}-\d{2}-\d{2}$|^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/;
        const boolSet  = new Set(['true','false','yes','no','y','n','0','1']);

        for (let i = 0; i < firstRow.length; i++) {
            const first = String(firstRow[i] ?? '').trim();
            const isNum  = first !== '' && !isNaN(+first);
            const isBool = boolSet.has(first.toLowerCase());
            const isDate = dateRx.test(first);
            if (!(isNum || isBool || isDate)) continue;

            const rest = sample.map(r => String(r[i] ?? '').trim()).filter(v => v !== '');
            if (!rest.length) continue;
            const matches = rest.filter(v =>
                (isNum  && !isNaN(+v)) ||
                (isBool && boolSet.has(v.toLowerCase())) ||
                (isDate && dateRx.test(v))
            ).length;
            if (matches / rest.length > 0.7) return false;
        }
        return true;
    }

    function detectIndexColumn(columns, data) {
        if (!columns.length || !data.length) return false;
        const col  = columns[0];
        const vals = data.map(r => r[col]);
        if (!vals.every(v => v !== '' && !isNaN(+v) && Number.isInteger(+v))) return false;
        const nums  = vals.map(Number);
        const start = nums[0];
        if (start !== 0 && start !== 1) return false;
        return nums.every((n, i) => n === start + i);
    }

    // ── Type detection ────────────────────────────────────────────────────────

    function detectType(values) {
        const nn = values.filter(v => v !== null && v !== undefined && v !== '');
        if (!nn.length) return 'empty';
        const bools = new Set(['true','false','yes','no','y','n','0','1']);
        if (nn.every(v => bools.has(String(v).toLowerCase()))) return 'boolean';
        if (nn.every(v => v !== '' && !isNaN(+v))) return 'numeric';
        const dateRx = /^\d{4}-\d{2}-\d{2}$|^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/;
        if (nn.every(v => dateRx.test(String(v).trim()))) return 'date';
        return 'categorical';
    }

    // ── Analysis ──────────────────────────────────────────────────────────────

    function analyze(data, columns) {
        const types = {}, stats = {};
        columns.forEach(col => {
            const vals  = data.map(r => r[col]);
            const type  = detectType(vals);
            types[col]  = type;
            const nulls = vals.filter(v => v === null || v === undefined || v === '').length;
            const nn    = vals.filter(v => v !== null && v !== undefined && v !== '');
            const unique = new Set(nn.map(String)).size;
            const base  = { total: vals.length, nulls, nullPct: nulls / vals.length, unique };

            if (type === 'numeric') {
                const nums = nn.map(Number).filter(n => !isNaN(n));
                const q1 = quantile(nums, 0.25), q3 = quantile(nums, 0.75);
                const iqr = q3 - q1;
                const outliers = nums.filter(n => n < q1 - 1.5 * iqr || n > q3 + 1.5 * iqr);
                stats[col] = {
                    ...base, type, nums,
                    mean: mean(nums), median: median(nums), std: std(nums),
                    min: Math.min(...nums), max: Math.max(...nums),
                    q1, q3, skewness: skew(nums),
                    outlierCount: outliers.length,
                    outlierPct: outliers.length / nums.length,
                };
            } else {
                const counts = {};
                nn.forEach(v => { const k = String(v); counts[k] = (counts[k] || 0) + 1; });
                const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                stats[col] = { ...base, type, top, mode: top[0] ?? null };
            }
        });
        return { types, stats };
    }

    function corrMatrix(data, numCols) {
        const mat = {};
        numCols.forEach(c1 => {
            mat[c1] = {};
            numCols.forEach(c2 => {
                const pairs = data
                    .map(r => [toNum(r[c1]), toNum(r[c2])])
                    .filter(([a, b]) => !isNaN(a) && !isNaN(b));
                mat[c1][c2] = pairs.length < 2 ? null
                    : pearson(pairs.map(p => p[0]), pairs.map(p => p[1]));
            });
        });
        return mat;
    }

    function genInsights(columns, types, stats, corr, numCols) {
        const out = [];

        // Missing values
        columns.forEach(col => {
            if (stats[col].nullPct > 0.5)
                out.push({ lvl: 'error', msg: `<b>${esc(col)}</b>: ${pct(stats[col].nullPct)} missing values (${stats[col].nulls.toLocaleString()} rows)` });
            else if (stats[col].nullPct > 0.2)
                out.push({ lvl: 'warn',  msg: `<b>${esc(col)}</b>: ${pct(stats[col].nullPct)} missing values (${stats[col].nulls.toLocaleString()} rows)` });
        });

        // Constant columns
        columns.forEach(col => {
            if (stats[col].unique === 1)
                out.push({ lvl: 'warn', msg: `<b>${esc(col)}</b> has only one unique value — not useful for analysis` });
        });

        // ID columns
        columns.forEach(col => {
            const nonNullCount = stats[col].total - stats[col].nulls;
            if (stats[col].unique === nonNullCount && nonNullCount > 20)
                out.push({ lvl: 'info', msg: `<b>${esc(col)}</b> has all unique values — likely an ID column` });
        });

        // Outliers
        columns.forEach(col => {
            if (types[col] === 'numeric' && stats[col].outlierPct > 0.05)
                out.push({ lvl: 'warn', msg: `<b>${esc(col)}</b> has ${stats[col].outlierCount.toLocaleString()} outliers (${pct(stats[col].outlierPct)}) based on 1.5× IQR` });
        });

        // Skewness
        columns.forEach(col => {
            if (types[col] === 'numeric' && Math.abs(stats[col].skewness) > 2)
                out.push({ lvl: 'info', msg: `<b>${esc(col)}</b> is heavily ${stats[col].skewness > 0 ? 'right' : 'left'}-skewed (skewness: ${fmtNum(stats[col].skewness)})` });
        });

        // High correlations
        for (let i = 0; i < numCols.length; i++) {
            for (let j = i + 1; j < numCols.length; j++) {
                const r = corr[numCols[i]]?.[numCols[j]];
                if (r !== null && r !== undefined && Math.abs(r) > 0.8)
                    out.push({ lvl: 'info', msg: `<b>${esc(numCols[i])}</b> and <b>${esc(numCols[j])}</b> are highly correlated (r = ${fmtNum(r)})` });
            }
        }

        return out;
    }

    function detectTarget(columns, types, stats) {
        if (columns.length < 2) return null;

        const classNames = ['target','label','class','y','output','outcome','result','response',
            'survived','churn','default','fraud','diagnosis','species','category','type',
            'status','flag','indicator','decision','pass','fail','passed','failed','approved'];
        const regNames   = ['price','score','value','amount','salary','cost','revenue','sales',
            'income','rate','total','sum','quantity','age','duration','weight','height',
            'temperature','rating','fare','tip','charges','bmi','loss','error','wage','rent'];

        let best = null, bestScore = 0;

        columns.forEach((col, idx) => {
            const type = types[col];
            const stat = stats[col];
            if (type === 'empty' || type === 'date') return;
            if (stat.nullPct > 0.5) return;

            const name = col.toLowerCase().replace(/[\s_\-]/g, '');
            let score = 0, taskType = null;

            if (classNames.some(k => name === k || name.endsWith(k) || name.startsWith(k)))
                { score += 5; taskType = 'classification'; }
            else if (regNames.some(k => name === k || name.endsWith(k) || name.startsWith(k)))
                { score += 5; taskType = 'regression'; }

            if (type === 'boolean')
                { score += 3; taskType = taskType || 'classification'; }
            else if (type === 'categorical' && stat.unique <= 2)
                { score += 3; taskType = taskType || 'classification'; }
            else if (type === 'categorical' && stat.unique <= 10)
                { score += 2; taskType = taskType || 'classification'; }
            else if (type === 'numeric')
                { score += 1; taskType = taskType || 'regression'; }

            if (idx === columns.length - 1) score += 2;

            if (score > bestScore && taskType) {
                bestScore = score;
                let detail = '', subType = null;
                if (taskType === 'classification') {
                    subType  = stat.unique === 2 ? 'Binary' : `${stat.unique}-class`;
                    const cls = (stat.top || []).slice(0, 5).map(([v]) => `"${v}"`).join(', ');
                    detail = `${stat.unique} classes: ${cls}`;
                } else {
                    detail = `Range: ${fmtNum(stat.min)} – ${fmtNum(stat.max)}`;
                }
                const confidence = score >= 7 ? 'high' : score >= 5 ? 'moderate' : 'low';
                best = { col, taskType, subType, detail, confidence };
            }
        });

        return bestScore >= 3 ? best : null;
    }

    function cramersV(x, y) {
        const n = x.length;
        if (n < 2) return 0;
        const rowCats = [...new Set(x)], colCats = [...new Set(y)];
        if (rowCats.length < 2 || colCats.length < 2) return 0;
        const table = {};
        rowCats.forEach(r => { table[r] = {}; colCats.forEach(c => table[r][c] = 0); });
        for (let i = 0; i < n; i++) table[x[i]][y[i]]++;
        const rowTotals = rowCats.map(r => colCats.reduce((s, c) => s + table[r][c], 0));
        const colTotals = colCats.map(c => rowCats.reduce((s, r) => s + table[r][c], 0));
        let chi2 = 0;
        rowCats.forEach((r, ri) => colCats.forEach((c, ci) => {
            const e = rowTotals[ri] * colTotals[ci] / n;
            if (e > 0) chi2 += (table[r][c] - e) ** 2 / e;
        }));
        const k = Math.min(rowCats.length, colCats.length);
        return Math.sqrt(chi2 / (n * (k - 1)));
    }

    function eta(numVals, catVals) {
        const grandMean = mean(numVals);
        const sst = numVals.reduce((s, v) => s + (v - grandMean) ** 2, 0);
        if (sst === 0) return 0;
        const cats = [...new Set(catVals)];
        const ssb = cats.reduce((s, cat) => {
            const g = numVals.filter((_, i) => catVals[i] === cat);
            return s + g.length * (mean(g) - grandMean) ** 2;
        }, 0);
        return Math.sqrt(ssb / sst);
    }

    // ── Statistical significance ───────────────────────────────────────────────

    function _lnGamma(z) {
        const g = 7;
        const c = [0.99999999999980993, 676.5203681218851, -1259.1392167224028,
                   771.32342877765313, -176.61502916214059, 12.507343278686905,
                   -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
        if (z < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * z)) - _lnGamma(1 - z);
        z -= 1;
        let x = c[0];
        for (let i = 1; i < g + 2; i++) x += c[i] / (z + i);
        const t = z + g + 0.5;
        return 0.5 * Math.log(2 * Math.PI) + (z + 0.5) * Math.log(t) - t + Math.log(x);
    }

    function regularizedIncompleteGamma(a, x) {
        if (x < 0 || a <= 0) return 0;
        if (x === 0) return 0;
        const logP0 = a * Math.log(x) - x - _lnGamma(a);
        if (x < a + 1) {
            let sum = 1 / a, term = 1 / a, an = a;
            for (let n = 0; n < 200; n++) {
                an += 1; term *= x / an; sum += term;
                if (Math.abs(term) < Math.abs(sum) * 1e-15) break;
            }
            return Math.min(1, Math.exp(logP0) * sum);
        } else {
            const FPMIN = 1e-300;
            let b = x + 1 - a, c = 1 / FPMIN, d = 1 / b, h = d;
            for (let i = 1; i <= 200; i++) {
                const an = -i * (i - a);
                b += 2;
                d = an * d + b; if (Math.abs(d) < FPMIN) d = FPMIN;
                c = b + an / c; if (Math.abs(c) < FPMIN) c = FPMIN;
                d = 1 / d;
                const del = d * c; h *= del;
                if (Math.abs(del - 1) < 1e-15) break;
            }
            return Math.max(0, Math.min(1, 1 - Math.exp(logP0) * h));
        }
    }

    function regularizedIncompleteBeta(a, b, x) {
        if (x <= 0) return 0;
        if (x >= 1) return 1;
        const lbt = a * Math.log(x) + b * Math.log(1 - x) - (_lnGamma(a) + _lnGamma(b) - _lnGamma(a + b));
        const bt  = Math.exp(lbt);
        function betaCF(a, b, x) {
            const FPMIN = 1e-300;
            const qab = a + b, qap = a + 1, qam = a - 1;
            let c = 1, d = 1 - qab * x / qap;
            if (Math.abs(d) < FPMIN) d = FPMIN;
            d = 1 / d; let h = d;
            for (let m = 1; m <= 200; m++) {
                const m2 = 2 * m;
                let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
                d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN;
                c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN;
                d = 1 / d; h *= d * c;
                aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
                d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN;
                c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN;
                d = 1 / d;
                const del = d * c; h *= del;
                if (Math.abs(del - 1) < 1e-15) break;
            }
            return h;
        }
        if (x < (a + 1) / (a + b + 2)) return bt * betaCF(a, b, x) / a;
        return 1 - bt * betaCF(b, a, 1 - x) / b;
    }

    function tDistCDF(t, df) {
        if (!isFinite(t) || !isFinite(df) || df <= 0) return NaN;
        const x = df / (df + t * t);
        return regularizedIncompleteBeta(df / 2, 0.5, x);
    }

    function chiSqPValue(chi2, df) {
        if (chi2 <= 0) return 1;
        if (!isFinite(chi2) || df <= 0) return NaN;
        return Math.max(0, 1 - regularizedIncompleteGamma(df / 2, chi2 / 2));
    }

    function fDistPValue(F, df1, df2) {
        if (F <= 0) return 1;
        if (!isFinite(F)) return 0;
        return regularizedIncompleteBeta(df2 / 2, df1 / 2, df2 / (df2 + df1 * F));
    }

    function tCritical(alpha, df) {
        let lo = 0, hi = 100;
        for (let i = 0; i < 60; i++) {
            const mid = (lo + hi) / 2;
            if (tDistCDF(mid, df) > alpha) hi = mid; else lo = mid;
        }
        return (lo + hi) / 2;
    }

    function welchTTest(a, b) {
        const nA = a.length, nB = b.length;
        if (nA < 2 || nB < 2) return null;
        const mA = mean(a), mB = mean(b);
        const varA = a.reduce((s, x) => s + (x - mA) ** 2, 0) / (nA - 1);
        const varB = b.reduce((s, x) => s + (x - mB) ** 2, 0) / (nB - 1);
        const seA = varA / nA, seB = varB / nB;
        const seDiff = Math.sqrt(seA + seB);
        if (seDiff === 0) return null;
        const t  = (mA - mB) / seDiff;
        const df = (seA + seB) ** 2 / (seA ** 2 / (nA - 1) + seB ** 2 / (nB - 1));
        const p  = tDistCDF(t, df);
        const pooledStd = Math.sqrt((varA * (nA - 1) + varB * (nB - 1)) / (nA + nB - 2));
        const cohensD   = pooledStd > 0 ? (mA - mB) / pooledStd : 0;
        const tCrit = tCritical(0.05, df);
        return { t, df, p, meanA: mA, meanB: mB, cohensD, ci95: [(mA - mB) - tCrit * seDiff, (mA - mB) + tCrit * seDiff], n: nA + nB };
    }

    function anova1way(groups) {
        const grps = groups.filter(g => g.length >= 2);
        if (grps.length < 2) return null;
        const k = grps.length;
        const allVals = grps.flat();
        const N = allVals.length;
        if (N < k + 1) return null;
        const grandMean  = mean(allVals);
        const groupMeans = grps.map(g => mean(g));
        const ssBetween  = grps.reduce((s, g, i) => s + g.length * (groupMeans[i] - grandMean) ** 2, 0);
        const ssWithin   = grps.reduce((s, g, i) => s + g.reduce((gs, x) => gs + (x - groupMeans[i]) ** 2, 0), 0);
        const df1 = k - 1, df2 = N - k;
        if (ssWithin === 0 || df2 <= 0) return null;
        const F = (ssBetween / df1) / (ssWithin / df2);
        const ssTotal = ssBetween + ssWithin;
        return { F, df1, df2, p: fDistPValue(F, df1, df2), etaSq: ssTotal > 0 ? ssBetween / ssTotal : 0, n: N, groupMeans, k };
    }

    function chiSqTest(x, y) {
        const n = x.length;
        if (n < 5) return null;
        const rowCats = [...new Set(x)], colCats = [...new Set(y)];
        if (rowCats.length < 2 || colCats.length < 2) return null;
        const table = {};
        rowCats.forEach(r => { table[r] = {}; colCats.forEach(c => table[r][c] = 0); });
        for (let i = 0; i < n; i++) table[x[i]][y[i]]++;
        const rowTotals = rowCats.map(r => colCats.reduce((s, c) => s + table[r][c], 0));
        const colTotals = colCats.map(c => rowCats.reduce((s, r) => s + table[r][c], 0));
        let chi2 = 0;
        rowCats.forEach((r, ri) => colCats.forEach((c, ci) => {
            const e = rowTotals[ri] * colTotals[ci] / n;
            if (e > 0) chi2 += (table[r][c] - e) ** 2 / e;
        }));
        const df = (rowCats.length - 1) * (colCats.length - 1);
        const k  = Math.min(rowCats.length, colCats.length);
        return { chi2, df, p: chiSqPValue(chi2, df), cramersV: Math.sqrt(chi2 / (n * (k - 1))), n, r: rowCats.length, c: colCats.length, table, rowCats, colCats, rowTotals };
    }

    function pearsonTest(x, y) {
        const n = x.length;
        if (n < 4) return null;
        const r = pearson(x, y);
        if (Math.abs(r) >= 1) return null;
        const t  = r * Math.sqrt(n - 2) / Math.sqrt(1 - r * r);
        const df = n - 2;
        const z  = 0.5 * Math.log((1 + r) / (1 - r));
        const se = 1 / Math.sqrt(n - 3);
        return { r, t, df, p: tDistCDF(t, df), ci95: [Math.tanh(z - 1.96 * se), Math.tanh(z + 1.96 * se)], n };
    }

    function effectSizeLabel(type, value) {
        const v = Math.abs(value);
        if (type === 'd')    return v < 0.2 ? 'small' : v < 0.5 ? 'medium' : 'large';
        if (type === 'eta2') return v < 0.01 ? 'small' : v < 0.06 ? 'medium' : 'large';
        return v < 0.1 ? 'small' : v < 0.3 ? 'medium' : 'large';
    }

    function runHypothesisTests(data, columns, types, stats, target) {
        if (!target) return null;
        const tCol  = target.col;
        const tType = target.taskType; // 'classification' or 'regression'

        const features = columns.filter(col =>
            col !== tCol &&
            types[col] !== 'empty' &&
            stats[col].nullPct <= 0.5 &&
            stats[col].unique > 1
        );

        const results = [];

        features.forEach(col => {
            const fType = types[col];
            const isNumericFeature = fType === 'numeric';
            const isCatFeature     = fType === 'categorical' || fType === 'boolean' ||
                                     (fType === 'numeric' && stats[col].unique === 2);

            if (tType === 'classification') {
                // Target is categorical — split numeric features by target groups
                if (isNumericFeature && stats[col].unique > 2) {
                    const groups = {};
                    data.forEach(row => {
                        const tVal = String(row[tCol] ?? '');
                        const fVal = toNum(row[col]);
                        if (tVal === '' || isNaN(fVal)) return;
                        if (!groups[tVal]) groups[tVal] = [];
                        groups[tVal].push(fVal);
                    });
                    const groupKeys   = Object.keys(groups);
                    const groupArrays = groupKeys.map(k => groups[k]);
                    if (groupArrays.some(g => g.length < 2)) return;
                    if (groupKeys.length === 2) {
                        const res = welchTTest(groupArrays[0], groupArrays[1]);
                        if (!res) return;
                        const eff = effectSizeLabel('d', res.cohensD);
                        results.push({
                            varA: col, varB: tCol, testName: 'Welch t-test', n: res.n,
                            statLabel: `t=${fmtNum(res.t, 3)}`, p: res.p,
                            effectSize: `d=${fmtNum(Math.abs(res.cohensD), 3)} ${eff}`,
                            keyResult: `${groupKeys[0]}: ${fmtNum(res.meanA, 2)} vs ${groupKeys[1]}: ${fmtNum(res.meanB, 2)}`,
                        });
                    } else if (groupKeys.length <= 8) {
                        const res = anova1way(groupArrays);
                        if (!res) return;
                        const eff = effectSizeLabel('eta2', res.etaSq);
                        const anovaKeyResult = groupKeys
                            .map((k, i) => ({ k, m: res.groupMeans[i] }))
                            .sort((a, b) => b.m - a.m)
                            .map(x => `${x.k}: ${fmtNum(x.m, 2)}`)
                            .join(' · ');
                        results.push({
                            varA: col, varB: tCol, testName: 'One-way ANOVA', n: res.n,
                            statLabel: `F=${fmtNum(res.F, 3)}`, p: res.p,
                            effectSize: `η²=${fmtNum(res.etaSq, 3)} ${eff}`,
                            keyResult: anovaKeyResult,
                        });
                    }
                } else if (isCatFeature && stats[col].unique <= 20) {
                    // Categorical feature vs categorical target → chi-squared
                    const xVals = [], yVals = [];
                    data.forEach(row => {
                        const a = String(row[col] ?? ''), b = String(row[tCol] ?? '');
                        if (a && b) { xVals.push(a); yVals.push(b); }
                    });
                    const res = chiSqTest(xVals, yVals);
                    if (!res) return;
                    const eff = effectSizeLabel('V', res.cramersV);
                    const rateRows = res.rowCats.map((r, ri) => {
                        const total = res.rowTotals[ri];
                        const rates = res.colCats.map(c => ({ c, rate: total > 0 ? res.table[r][c] / total : 0 }));
                        return { label: r, rates };
                    });
                    let chiKeyResult;
                    if (res.colCats.length === 2) {
                        const posClass = res.colCats[1];
                        chiKeyResult = rateRows
                            .map(row => ({ label: row.label, rate: row.rates.find(x => x.c === posClass).rate }))
                            .sort((a, b) => b.rate - a.rate)
                            .map(x => `${x.label}: ${(x.rate * 100).toFixed(0)}%`)
                            .join(' · ');
                    } else {
                        chiKeyResult = rateRows
                            .map(row => {
                                const best = row.rates.reduce((a, b) => a.rate > b.rate ? a : b);
                                return `${row.label}→${best.c}(${(best.rate * 100).toFixed(0)}%)`;
                            })
                            .join(' · ');
                    }
                    results.push({
                        varA: col, varB: tCol, testName: 'Chi-squared', n: res.n,
                        statLabel: `χ²=${fmtNum(res.chi2, 3)}`, p: res.p,
                        effectSize: `V=${fmtNum(res.cramersV, 3)} ${eff}`,
                        keyResult: chiKeyResult,
                    });
                }
            } else if (tType === 'regression') {
                // Target is numeric
                if (isNumericFeature && stats[col].unique > 2) {
                    // Numeric feature vs numeric target → Pearson r
                    const xVals = [], yVals = [];
                    data.forEach(row => {
                        const a = toNum(row[col]), b = toNum(row[tCol]);
                        if (!isNaN(a) && !isNaN(b)) { xVals.push(a); yVals.push(b); }
                    });
                    const res = pearsonTest(xVals, yVals);
                    if (!res) return;
                    const eff = effectSizeLabel('r', res.r);
                    results.push({
                        varA: col, varB: tCol, testName: 'Pearson r', n: res.n,
                        statLabel: `r=${fmtNum(res.r, 3)}`, p: res.p,
                        effectSize: `r=${fmtNum(Math.abs(res.r), 3)} ${eff}`,
                        keyResult: `95% CI [${fmtNum(res.ci95[0], 3)}, ${fmtNum(res.ci95[1], 3)}]`,
                    });
                } else if (isCatFeature) {
                    // Categorical feature vs numeric target → split target by feature groups
                    const groups = {};
                    data.forEach(row => {
                        const fVal = String(row[col] ?? '');
                        const tVal = toNum(row[tCol]);
                        if (fVal === '' || isNaN(tVal)) return;
                        if (!groups[fVal]) groups[fVal] = [];
                        groups[fVal].push(tVal);
                    });
                    const groupKeys   = Object.keys(groups);
                    const groupArrays = groupKeys.map(k => groups[k]);
                    if (groupArrays.some(g => g.length < 2)) return;
                    if (groupKeys.length === 2) {
                        const res = welchTTest(groupArrays[0], groupArrays[1]);
                        if (!res) return;
                        const eff = effectSizeLabel('d', res.cohensD);
                        results.push({
                            varA: col, varB: tCol, testName: 'Welch t-test', n: res.n,
                            statLabel: `t=${fmtNum(res.t, 3)}`, p: res.p,
                            effectSize: `d=${fmtNum(Math.abs(res.cohensD), 3)} ${eff}`,
                            keyResult: `${groupKeys[0]}: ${fmtNum(res.meanA, 2)} vs ${groupKeys[1]}: ${fmtNum(res.meanB, 2)}`,
                        });
                    } else if (groupKeys.length <= 8) {
                        const res = anova1way(groupArrays);
                        if (!res) return;
                        const eff = effectSizeLabel('eta2', res.etaSq);
                        const anovaKeyResult = groupKeys
                            .map((k, i) => ({ k, m: res.groupMeans[i] }))
                            .sort((a, b) => b.m - a.m)
                            .map(x => `${x.k}: ${fmtNum(x.m, 2)}`)
                            .join(' · ');
                        results.push({
                            varA: col, varB: tCol, testName: 'One-way ANOVA', n: res.n,
                            statLabel: `F=${fmtNum(res.F, 3)}`, p: res.p,
                            effectSize: `η²=${fmtNum(res.etaSq, 3)} ${eff}`,
                            keyResult: anovaKeyResult,
                        });
                    }
                }
            }
        });

        // Bonferroni correction
        const totalTests = results.length;
        results.forEach(r => { r.pAdj = Math.min(r.p * totalTests, 1); });

        // Sort: significant first, then by pAdj
        results.sort((a, b) => {
            const aSig = a.pAdj < 0.05 ? 0 : 1, bSig = b.pAdj < 0.05 ? 0 : 1;
            return aSig !== bSig ? aSig - bSig : a.pAdj - b.pAdj;
        });

        return { results, totalTests };
    }

    function featureImportance(data, columns, types, stats, target) {
        const tCol  = target.col;
        const tStrs = data.map(r => String(r[tCol] ?? ''));
        const tNums = data.map(r => toNum(r[tCol]));
        const uniqueTargets = [...new Set(tStrs.filter(v => v !== ''))];
        const isBinary = uniqueTargets.length === 2;
        const tEnc  = isBinary ? tStrs.map(v => v === uniqueTargets[0] ? 0 : 1) : null;

        return columns
            .filter(c => c !== tCol && types[c] !== 'empty' && types[c] !== 'date')
            .map(col => {
                const type = types[col];
                let score = 0, method = '';

                if (type === 'numeric') {
                    const fNums = data.map(r => toNum(r[col]));
                    if (target.taskType === 'regression') {
                        const pairs = fNums.map((n, i) => [n, tNums[i]]).filter(([a, b]) => !isNaN(a) && !isNaN(b));
                        if (pairs.length >= 2) { score = Math.abs(pearson(pairs.map(p => p[0]), pairs.map(p => p[1]))); method = '|r|'; }
                    } else if (isBinary) {
                        const pairs = fNums.map((n, i) => [n, tEnc[i]]).filter(([a]) => !isNaN(a));
                        if (pairs.length >= 2) { score = Math.abs(pearson(pairs.map(p => p[0]), pairs.map(p => p[1]))); method = '|r|'; }
                    } else {
                        const valid = fNums.map((n, i) => [n, tStrs[i]]).filter(([n, t]) => !isNaN(n) && t !== '');
                        if (valid.length >= 2) { score = eta(valid.map(p => p[0]), valid.map(p => p[1])); method = 'η'; }
                    }
                } else if (type === 'categorical' || type === 'boolean') {
                    const st = stats ? stats[col] : null;
                    if (st && st.unique > 20) { return { col, type, score: 0, method: '' }; }
                    const fStrs = data.map(r => String(r[col] ?? ''));
                    const valid = fStrs.map((s, i) => [s, tStrs[i]]).filter(([a, b]) => a !== '' && b !== '');
                    if (valid.length >= 2) { score = cramersV(valid.map(p => p[0]), valid.map(p => p[1])); method = 'V'; }
                }
                return { col, type, score, method };
            })
            .filter(f => f.score > 0)
            .sort((a, b) => b.score - a.score);
    }

    function encodeAbility(columns, types, stats, target) {
        return columns.map(col => {
            const type    = types[col];
            const stat    = stats[col];
            const nonNull = stat.total - stat.nulls;
            const allUniq = stat.unique === nonNull && nonNull > 20;
            const isTarget = target && col === target.col;
            const nullNote = stat.nulls > 0 ? `impute ${stat.nulls.toLocaleString()} missing` : '';

            let action, note, level;

            if (type === 'empty') {
                action = 'Drop'; note = 'No data'; level = 'drop';
            } else if (type === 'numeric' && allUniq) {
                action = 'Drop'; note = `All unique — likely ID${nullNote ? ' · ' + nullNote : ''}`; level = 'drop';
            } else if (type === 'numeric') {
                action = 'Ready'; note = nullNote; level = 'ready';
            } else if (type === 'boolean') {
                action = 'Map to 0 / 1'; note = nullNote; level = 'encode';
            } else if (type === 'date') {
                action = 'Extract features'; note = `Year, month, day, weekday${nullNote ? ' · ' + nullNote : ''}`; level = 'encode';
            } else if (type === 'categorical') {
                if (allUniq) {
                    action = 'Drop'; note = `All unique — likely ID${nullNote ? ' · ' + nullNote : ''}`; level = 'drop';
                } else if (isTarget) {
                    action = stat.unique === 2 ? 'Map to 0 / 1' : 'Label encode';
                    note = `Focus · ${stat.unique} classes${nullNote ? ' · ' + nullNote : ''}`;
                    level = 'encode';
                } else if (stat.unique === 2) {
                    action = 'Map to 0 / 1'; note = `2 categories → 1 col${nullNote ? ' · ' + nullNote : ''}`; level = 'encode';
                } else if (stat.unique <= 20) {
                    action = 'One-hot encode'; note = `${stat.unique} categories → ${stat.unique} cols${nullNote ? ' · ' + nullNote : ''}`; level = 'encode';
                } else {
                    action = 'High cardinality'; note = `${stat.unique} unique — target encode or drop${nullNote ? ' · ' + nullNote : ''}`; level = 'warn';
                }
            }

            return { col, type, action, note, level, isTarget };
        });
    }

    function recommendScaling(columns, types, stats) {
        const rows = columns
            .filter(c => types[c] === 'numeric')
            .map(col => {
                const s = stats[col];
                const hasOutliers = s.outlierPct > 0.05;
                const highSkew    = Math.abs(s.skewness) > 2;
                const modSkew     = Math.abs(s.skewness) > 1;

                if (hasOutliers || highSkew || modSkew) {
                    if (highSkew && s.min > 0) {
                        return { col, scaler: 'Log → StandardScaler', reason: `Skewness ${fmtNum(s.skewness)}, all positive`, level: 'transform' };
                    }
                    return {
                        col,
                        scaler: 'RobustScaler',
                        reason: hasOutliers ? `${s.outlierCount.toLocaleString()} outliers (${pct(s.outlierPct)})${modSkew ? `, skewness ${fmtNum(s.skewness)}` : ''}` : `Skewness ${fmtNum(s.skewness)}`,
                        level: 'robust',
                    };
                }
                return { col, scaler: 'StandardScaler', reason: `Skewness ${fmtNum(s.skewness)}`, level: 'standard' };
            });

        const overall = rows.some(r => r.level === 'robust' || r.level === 'transform')
            ? 'RobustScaler' : 'StandardScaler';
        return { rows, overall };
    }

    function clusteringReadiness(columns, types, stats) {
        const usableNumeric = columns.filter(c => types[c] === 'numeric' && stats[c].nullPct < 0.5);
        const usableBoolean = columns.filter(c => types[c] === 'boolean');
        const usable        = [...usableNumeric, ...usableBoolean];

        let algorithm = null, algorithmReason = '';
        if (usableNumeric.length > 0) {
            const medOutlierPct = median(usableNumeric.map(c => stats[c].outlierPct));
            if (medOutlierPct < 0.05) {
                algorithm = 'K-Means';
                algorithmReason = `Median outlier rate ${(medOutlierPct * 100).toFixed(1)}% — data is relatively clean`;
            } else {
                algorithm = 'DBSCAN';
                algorithmReason = `Median outlier rate ${(medOutlierPct * 100).toFixed(1)}% — DBSCAN is more robust to outliers`;
            }
        } else if (usable.length > 0) {
            algorithm = 'K-Means'; algorithmReason = 'Only boolean features — encode as 0/1 then cluster';
        }

        return {
            featureCount:          usable.length,
            usable,
            algorithm,
            algorithmReason,
            colsNeedingImputation: usableNumeric.filter(c => stats[c].nulls > 0),
            categoricalCols:       columns.filter(c => types[c] === 'categorical' && stats[c].nullPct < 0.5),
            needsScaling:          usableNumeric.length > 0,
            excludedHighNull:      columns.filter(c => types[c] === 'numeric' && stats[c].nullPct >= 0.5),
        };
    }

    function jacobiEigen(n, C) {
        const A   = C.map(row => [...row]);
        const TOL = 1e-10;
        for (let sweep = 0; sweep < 100; sweep++) {
            let offDiag = 0;
            for (let i = 0; i < n; i++)
                for (let j = i + 1; j < n; j++) offDiag += A[i][j] * A[i][j];
            if (offDiag < TOL) break;
            for (let i = 0; i < n - 1; i++) {
                for (let j = i + 1; j < n; j++) {
                    if (Math.abs(A[i][j]) < 1e-14) continue;
                    const tau = (A[j][j] - A[i][i]) / (2 * A[i][j]);
                    const t   = Math.sign(tau) / (Math.abs(tau) + Math.sqrt(1 + tau * tau));
                    const c   = 1 / Math.sqrt(1 + t * t);
                    const s   = t * c;
                    const aij = A[i][j];
                    A[i][i] -= t * aij; A[j][j] += t * aij;
                    A[i][j]  = 0;      A[j][i]  = 0;
                    for (let k = 0; k < n; k++) {
                        if (k === i || k === j) continue;
                        const aik = A[i][k], ajk = A[j][k];
                        A[i][k] = c * aik - s * ajk; A[k][i] = A[i][k];
                        A[j][k] = s * aik + c * ajk; A[k][j] = A[j][k];
                    }
                }
            }
        }
        return Array.from({ length: n }, (_, i) => A[i][i])
            .sort((a, b) => b - a).map(v => Math.max(v, 0));
    }

    function pcaVarianceHint(plotCols, corr) {
        const n = plotCols.length;
        if (n < 2) return null;
        const C    = plotCols.map(c1 => plotCols.map(c2 => {
            if (c1 === c2) return 1;
            const r = corr[c1]?.[c2];
            return (r === null || r === undefined) ? 0 : r;
        }));
        const eigs  = jacobiEigen(n, C);
        const total = eigs.reduce((s, v) => s + v, 0);
        const varPct = eigs.map(v => (v / total) * 100);
        let cumSum = 0;
        const cumVar = eigs.map(v => { cumSum += v; return cumSum / total; });
        const find   = t => { const i = cumVar.findIndex(v => v >= t); return i === -1 ? n : i + 1; };
        return {
            n, eigs, varPct, cumVar,
            comp80: find(0.80), comp90: find(0.90), comp95: find(0.95),
            firstCompVar: varPct[0],
            independent: varPct[0] < 50,
        };
    }

    function detectDuplicates(data, columns) {
        const counts = new Map();
        data.forEach(row => {
            const key = columns.map(c => String(row[c] ?? '')).join('\x00');
            counts.set(key, (counts.get(key) || 0) + 1);
        });
        const extra = [...counts.values()].filter(n => n > 1).reduce((s, n) => s + n - 1, 0);
        return { extra, pct: extra / data.length };
    }

    function recommendSplit(data, target, stats) {
        const n = data.length;
        if (!target) return null;
        if (n < 200) return { kfold: true, folds: 5, n };

        const trainRatio = n < 1000 ? 0.70 : 0.80;
        const note       = n < 1000 ? '70 / 30' : '80 / 20';
        const reason     = n < 1000 ? '200–999 rows' : '≥1000 rows';
        const trainN     = Math.round(n * trainRatio);
        const testN      = n - trainN;

        let classes = null, tinyClasses = [];
        if (target.taskType === 'classification') {
            const st    = stats[target.col];
            const total = st.total - st.nulls;
            classes = (st.top || []).map(([v, count]) => {
                const testCount  = Math.round(count * (1 - trainRatio));
                const trainCount = count - testCount;
                return { v, count, trainCount, testCount, pct: count / total };
            });
            tinyClasses = classes.filter(c => c.testCount < 5);
        }

        return { kfold: false, note, reason, trainRatio, trainN, testN, n, stratify: target.taskType === 'classification', classes, tinyClasses };
    }

    // ── Rendering ─────────────────────────────────────────────────────────────

    let _state = null;
    let _kmCache = null;

    function resetApp() { _state = null; _kmCache = null; renderUpload(); }

    function buildTarget(col, types, stats) {
        const type = types[col];
        const st = stats[col];
        if (!st) return null;
        if (type === 'categorical' || type === 'boolean') {
            const u = st.unique;
            const top = (st.top || []).slice(0, 3).map(([v]) => `"${v}"`).join(', ');
            return { col, taskType: 'classification', subType: u === 2 ? 'Binary' : `${u}-class`,
                     detail: `${u} classes: ${top}${u > 3 ? '…' : ''}`, confidence: 'manual' };
        } else if (type === 'numeric') {
            return { col, taskType: 'regression', subType: null,
                     detail: st.min !== undefined ? `Range: ${fmtNum(st.min, 2)} – ${fmtNum(st.max, 2)}` : '',
                     confidence: 'manual' };
        }
        return null;
    }

    function changeTarget(col) {
        if (!_state) return;
        const { file, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex } = _state;
        const target = col === '__none__' ? null : buildTarget(col, types, stats);
        renderAnalysis(file.name, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex, target);
    }

        document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex flex-col items-center justify-center p-4">

    function setupDropzone() {
        const dz = document.getElementById('dropzone');
        const fi = document.getElementById('file-input');
        dz.addEventListener('click', () => fi.click());
        fi.addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
        dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drop-active'); });
        dz.addEventListener('dragleave', ()  => dz.classList.remove('drop-active'));
        dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('drop-active');
            const f = e.dataTransfer.files[0];
            if (f && f.name.toLowerCase().endsWith('.csv')) loadFile(f);
        });

    function loadFile(file) {
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex items-center justify-center">
                <div class="text-center">
                    <div class="spinner mx-auto mb-4"></div>
                    <p class="text-white/50">Analyzing ${esc(file.name)}…</p>
                </div>
            </div>
        `;
        Papa.parse(file, {
            header: false,
            skipEmptyLines: true,
            dynamicTyping: false,
            complete: result => {
                const rows = result.data;
                if (!rows.length) {
                    document.getElementById('app').innerHTML = `
                        <div class="min-h-screen flex items-center justify-center">
                            <p class="text-red-400">The file appears to be empty — no rows found.</p>
                        </div>
                    `;
                    return;
                }

                const hasHeader = detectHeader(rows);
                let columns, data;
                if (hasHeader) {
                    columns = rows[0].map(String);
                    data = rows.slice(1).map(row => Object.fromEntries(columns.map((col, i) => [col, row[i] ?? ''])));
                } else {
                    columns = Array.from({ length: rows[0].length }, (_, i) => `Column ${i + 1}`);
                    data = rows.map(row => Object.fromEntries(columns.map((col, i) => [col, row[i] ?? ''])));
                }

                let droppedIndex = false;
                if (detectIndexColumn(columns, data)) {
                    const idxCol = columns[0];
                    data    = data.map(row => { const r = { ...row }; delete r[idxCol]; return r; });
                    columns = columns.slice(1);
                    droppedIndex = true;
                }

                const { types, stats } = analyze(data, columns);
                const numCols  = columns.filter(c => types[c] === 'numeric');
                const plotCols = columns.filter(c => types[c] === 'numeric' || types[c] === 'boolean');
                const catCols  = columns.filter(c => types[c] === 'categorical');
                const corr     = plotCols.length >= 2 ? corrMatrix(data, plotCols) : {};
                const insights = genInsights(columns, types, stats, corr, numCols);
                const target   = detectTarget(columns, types, stats);
                _state = { file, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex };
                renderAnalysis(file.name, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex, target);
            },
            error: err => {
                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen flex items-center justify-center">
                        <p class="text-red-400">Error parsing file: ${err.message}</p>
                    </div>
                `;
            }
        });
    }

    function typeBadge(type) {
        const styles = {
            numeric:     'bg-blue-100 text-blue-700',
            categorical: 'bg-purple-100 text-purple-700',
            boolean:     'bg-green-100 text-green-700',
            date:        'bg-orange-100 text-orange-700',
            empty:       'bg-gray-100 text-gray-400',
        };
        return `<span class="text-xs font-medium px-2 py-0.5 rounded-full ${styles[type] || 'bg-gray-100 text-gray-400'}">${type}</span>`;
    }

    function statBox(label, value) {
        return `<div><div class="text-xs text-gray-400 mb-0.5">${label}</div><div class="font-semibold text-gray-800 text-sm">${value}</div></div>`;
    }

    // ── Decision Tree ─────────────────────────────────────────────────────────

    function dtImpurity(rows, col, taskType) {
        if (!rows.length) return 0;
        if (taskType === 'regression') {
            const vals = rows.map(r => toNum(r[col])).filter(v => !isNaN(v));
            if (vals.length < 2) return 0;
            const m = mean(vals);
            return vals.reduce((s, v) => s + (v - m) ** 2, 0) / vals.length;
        }
        const counts = {};
        rows.forEach(r => { const v = String(r[col] ?? ''); counts[v] = (counts[v] || 0) + 1; });
        const n = rows.length;
        return 1 - Object.values(counts).reduce((s, c) => s + (c / n) ** 2, 0);
    }

    function dtBestSplit(rows, features, types, col, taskType) {
        let bestGain = 1e-9, bestFeat = null, bestThr = null, bestSplitType = null;
        const baseImp = dtImpurity(rows, col, taskType);
        const n = rows.length;
        for (const feat of features) {
            if (types[feat] === 'numeric' || types[feat] === 'boolean') {
                const vals = rows.map(r => toNum(r[feat])).filter(v => !isNaN(v));
                const sorted = [...new Set(vals)].sort((a, b) => a - b);
                if (sorted.length < 2) continue;
                const step = Math.max(1, Math.floor(sorted.length / 20));
                for (let i = 0; i < sorted.length - 1; i += step) {
                    const t = (sorted[i] + sorted[Math.min(i + step, sorted.length - 1)]) / 2;
                    const left  = rows.filter(r => { const v = toNum(r[feat]); return !isNaN(v) && v <= t; });
                    const right = rows.filter(r => { const v = toNum(r[feat]); return !isNaN(v) && v > t; });
                    if (!left.length || !right.length) continue;
                    const gain = baseImp
                        - (left.length / n)  * dtImpurity(left,  col, taskType)
                        - (right.length / n) * dtImpurity(right, col, taskType);
                    if (gain > bestGain) { bestGain = gain; bestFeat = feat; bestThr = t; bestSplitType = 'numeric'; }
                }
            } else if (types[feat] === 'categorical') {
                const uniq = [...new Set(rows.map(r => String(r[feat] ?? '')).filter(v => v !== ''))];
                if (uniq.length < 2) continue;
                for (const v of uniq) {
                    const left  = rows.filter(r => String(r[feat] ?? '') === v);
                    const right = rows.filter(r => String(r[feat] ?? '') !== v);
                    if (!left.length || !right.length) continue;
                    const gain = baseImp
                        - (left.length / n)  * dtImpurity(left,  col, taskType)
                        - (right.length / n) * dtImpurity(right, col, taskType);
                    if (gain > bestGain) { bestGain = gain; bestFeat = feat; bestThr = v; bestSplitType = 'categorical'; }
                }
            }
        }
        return bestFeat ? { feat: bestFeat, thr: bestThr, splitType: bestSplitType, gain: bestGain } : null;
    }

    function dtBuild(rows, features, types, col, taskType, depth = 0, maxDepth = 3, minLeaf = 5) {
        const n = rows.length;
        const imp = dtImpurity(rows, col, taskType);
        let value, classes = null;
        if (taskType === 'regression') {
            const vals = rows.map(r => toNum(r[col])).filter(v => !isNaN(v));
            value = vals.length ? mean(vals) : 0;
        } else {
            const counts = {};
            rows.forEach(r => { const v = String(r[col] ?? ''); counts[v] = (counts[v] || 0) + 1; });
            value = Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] ?? '';
            classes = counts;
        }
        const leaf = { n, imp, value, classes, isLeaf: true, depth };
        if (depth >= maxDepth || n < minLeaf * 2 || imp < 1e-7) return leaf;
        const split = dtBestSplit(rows, features, types, col, taskType);
        if (!split) return leaf;
        const leftRows  = split.splitType === 'numeric'
            ? rows.filter(r => { const v = toNum(r[split.feat]); return !isNaN(v) && v <= split.thr; })
            : rows.filter(r => String(r[split.feat] ?? '') === split.thr);
        const rightRows = split.splitType === 'numeric'
            ? rows.filter(r => { const v = toNum(r[split.feat]); return !isNaN(v) && v > split.thr; })
            : rows.filter(r => String(r[split.feat] ?? '') !== split.thr);
        if (leftRows.length < minLeaf || rightRows.length < minLeaf) return leaf;
        return { ...leaf, isLeaf: false, feat: split.feat, thr: split.thr, splitType: split.splitType, gain: split.gain,
            left:  dtBuild(leftRows,  features, types, col, taskType, depth + 1, maxDepth, minLeaf),
            right: dtBuild(rightRows, features, types, col, taskType, depth + 1, maxDepth, minLeaf) };
    }

    function dtPredict(node, row) {
        if (node.isLeaf) return node.value;
        const goLeft = node.splitType === 'numeric'
            ? (v => !isNaN(v) && v <= node.thr)(toNum(row[node.feat]))
            : String(row[node.feat] ?? '') === node.thr;
        return dtPredict(goLeft ? node.left : node.right, row);
    }

    function dtEvaluate(root, rows, col, taskType) {
        if (!rows.length) return null;
        if (taskType === 'regression') {
            const valid = rows.filter(r => !isNaN(toNum(r[col])));
            if (!valid.length) return { r2: null };
            const actuals = valid.map(r => toNum(r[col]));
            const preds   = valid.map(r => Number(dtPredict(root, r)));
            const mse_    = mean(preds.map((p, i) => (p - actuals[i]) ** 2));
            const m       = mean(actuals);
            const tss     = mean(actuals.map(v => (v - m) ** 2));
            return { r2: tss > 0 ? 1 - mse_ / tss : 1, mse: mse_ };
        }
        let correct = 0;
        rows.forEach(r => { if (dtPredict(root, r) === String(r[col] ?? '')) correct++; });
        return { accuracy: correct / rows.length };
    }

    function dtImportance(root) {
        const imp = {};
        const walk = n => { if (n.isLeaf) return; imp[n.feat] = (imp[n.feat] || 0) + n.gain * n.n; walk(n.left); walk(n.right); };
        walk(root);
        const total = Object.values(imp).reduce((s, v) => s + v, 0) || 1;
        return Object.entries(imp).map(([col, val]) => ({ col, score: val / total })).sort((a, b) => b.score - a.score);
    }

    function dtDepth(n) { return n.isLeaf ? 0 : 1 + Math.max(dtDepth(n.left), dtDepth(n.right)); }
    function dtCount(n) { return n.isLeaf ? 1 : 1 + dtCount(n.left) + dtCount(n.right); }

    function dtSVG(root, taskType) {
        const LEAF_W = 155, LEVEL_H = 110, NW = 144, NH = 66, RX = 7;
        const FONT = 'DM Sans, sans-serif';
        let leafIdx = 0;

        function leafCnt(n) { return n.isLeaf ? 1 : leafCnt(n.left) + leafCnt(n.right); }
        function maxDep(n)  { return n.isLeaf ? 0 : 1 + Math.max(maxDep(n.left), maxDep(n.right)); }
        const lc = leafCnt(root), depth = maxDep(root);
        const W = Math.max(lc * LEAF_W, NW + 20), H = (depth + 1) * LEVEL_H + 30;

        function assign(n, d) {
            if (n.isLeaf) { n._x = (leafIdx++ + 0.5) * LEAF_W; n._y = d * LEVEL_H + NH / 2 + 15; }
            else { assign(n.left, d + 1); assign(n.right, d + 1); n._x = (n.left._x + n.right._x) / 2; n._y = d * LEVEL_H + NH / 2 + 15; }
        }
        assign(root, 0);

        const clsSet = new Set();
        (function gather(n) { if (n.classes) Object.keys(n.classes).forEach(c => clsSet.add(c)); if (!n.isLeaf) { gather(n.left); gather(n.right); } })(root);
        const pal = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16','#ec4899'];
        const clsColor = Object.fromEntries([...clsSet].map((c, i) => [c, pal[i % pal.length]]));

        function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function trunc(s, n) { const t = String(s); return t.length > n ? t.slice(0, n - 1) + '…' : t; }

        let edges = '', nodes = '';
        function render(n) {
            const bx = n._x - NW / 2, by = n._y - NH / 2;
            let fill = '#f5f6ff', stroke = '#818cf8';
            if (n.isLeaf) {
                if (taskType === 'classification' && n.value) { const c = clsColor[n.value] || '#6366f1'; fill = c + '22'; stroke = c; }
                else { fill = '#f0fdf4'; stroke = '#34d399'; }
            }
            if (!n.isLeaf) {
                const y1 = n._y + NH / 2, midY = (n._y + NH / 2 + n.left._y - NH / 2) / 2;
                [n.left, n.right].forEach((child, side) => {
                    edges += `<path d="M${n._x},${y1} C${n._x},${midY} ${child._x},${midY} ${child._x},${child._y - NH / 2}" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>`;
                    const lx = (n._x * 1 + child._x * 2) / 3;
                    edges += `<text x="${lx}" y="${midY - 4}" font-size="8" fill="#94a3b8" text-anchor="middle" font-family="${FONT}">${side === 0 ? 'yes' : 'no'}</text>`;
                });
            }
            nodes += `<rect x="${bx}" y="${by}" width="${NW}" height="${NH}" rx="${RX}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
            if (!n.isLeaf) {
                const cond = n.splitType === 'numeric'
                    ? `${trunc(n.feat, 14)} ≤ ${fmtNum(n.thr, 3)}`
                    : `${trunc(n.feat, 11)} = "${trunc(n.thr, 9)}"`;
                nodes += `<text x="${n._x}" y="${by+16}" font-size="9.5" font-weight="600" fill="#1e293b" text-anchor="middle" font-family="${FONT}">${esc(cond)}</text>`;
                nodes += `<text x="${n._x}" y="${by+31}" font-size="8.5" fill="#64748b" text-anchor="middle" font-family="${FONT}">n = ${n.n}</text>`;
                nodes += `<text x="${n._x}" y="${by+46}" font-size="8" fill="#94a3b8" text-anchor="middle" font-family="${FONT}">${taskType === 'regression' ? 'mse' : 'gini'} = ${fmtNum(n.imp, 3)}</text>`;
            } else {
                const label = taskType === 'regression' ? fmtNum(n.value, 3) : trunc(String(n.value), 20);
                const lclr  = taskType === 'classification' ? (clsColor[n.value] || '#1e293b') : '#059669';
                nodes += `<text x="${n._x}" y="${by+16}" font-size="10" font-weight="700" fill="${lclr}" text-anchor="middle" font-family="${FONT}">${esc(label)}</text>`;
                nodes += `<text x="${n._x}" y="${by+31}" font-size="8.5" fill="#64748b" text-anchor="middle" font-family="${FONT}">n = ${n.n}</text>`;
                nodes += `<text x="${n._x}" y="${by+46}" font-size="8" fill="#94a3b8" text-anchor="middle" font-family="${FONT}">${taskType === 'regression' ? 'mse' : 'gini'} = ${fmtNum(n.imp, 3)}</text>`;
                if (n.classes) {
                    const top2 = Object.entries(n.classes).sort((a, b) => b[1] - a[1]).slice(0, 2);
                    const ds = top2.map(([c, cnt]) => `${trunc(c, 8)} ${Math.round(cnt / n.n * 100)}%`).join(' · ');
                    nodes += `<text x="${n._x}" y="${by+59}" font-size="7.5" fill="#94a3b8" text-anchor="middle" font-family="${FONT}">${esc(ds)}</text>`;
                }
            }
            if (!n.isLeaf) { render(n.left); render(n.right); }
        }
        render(root);
        return `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="min-width:${Math.min(W, 900)}px;width:100%;height:${H}px;display:block">${edges}${nodes}</svg></div>`;
    }

    const _KM_PALETTE = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16','#ec4899','#14b8a6'];

    function showClusterProfiles(k) {
        if (!_kmCache) return;
        const { kCols, colMeans, colStds, elbowData } = _kmCache;
        const entry = elbowData.find(d => d.k === k);
        if (!entry) return;
        const sizes = new Array(k).fill(0);
        entry.labels.forEach(l => sizes[l]++);
        const centroids = entry.centroids.map(centroid =>
            centroid.map((v, di) => colStds[di] > 0 ? v * colStds[di] + colMeans[di] : colMeans[di])
        );
        const html = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            ${centroids.map((centroid, ci) => `
            <div class="rounded-lg border border-gray-100 overflow-hidden">
                <div class="h-1.5" style="background:${_KM_PALETTE[ci % _KM_PALETTE.length]}"></div>
                <div class="p-3">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-semibold text-gray-700">Cluster ${ci + 1}</span>
                        <span class="text-xs text-gray-400">${sizes[ci].toLocaleString()} pts</span>
                    </div>
                    <table class="text-xs w-full">
                        ${kCols.map((col, di) => `
                        <tr class="border-b border-gray-50 last:border-0">
                            <td class="py-0.5 pr-2 text-gray-500 truncate" style="max-width:120px" title="${esc(col)}">${esc(col)}</td>
                            <td class="py-0.5 text-right font-mono text-gray-700">${fmtNum(centroid[di], 3)}</td>
                        </tr>`).join('')}
                    </table>
                </div>
            </div>`).join('')}
        </div>`;
        const el = document.getElementById('km-profiles');
        if (el) el.innerHTML = html;
        elbowData.filter(d => d.k >= 2).forEach(d => {
            const btn = document.getElementById(`km-btn-${d.k}`);
            if (!btn) return;
            btn.className = d.k === k
                ? 'text-xs px-2 py-1 rounded border bg-indigo-600 text-white border-indigo-600'
                : 'text-xs px-2 py-1 rounded border bg-white text-gray-600 border-gray-200 hover:border-indigo-400 hover:text-indigo-600';
        });
    }

    function renderAnalysis(filename, data, columns, types, stats, numCols, plotCols, catCols, corr, insights, hasHeader, droppedIndex, target) {
        const typeCounts = {};
        columns.forEach(c => { typeCounts[types[c]] = (typeCounts[types[c]] || 0) + 1; });
        const typeIcons  = { numeric: '🔢', categorical: '🔤', boolean: '✅', date: '📅', empty: '⬜' };
        const pairHeight = Math.min(plotCols.length, 8) * 160 + 40;
        const corrHeight = Math.max(320, plotCols.length * 44 + 120);

        const dups          = detectDuplicates(data, columns);
        const hypTests      = target ? runHypothesisTests(data, columns, types, stats, target) : null;
        const scaling       = numCols.length ? recommendScaling(columns, types, stats) : null;
        const clustering    = clusteringReadiness(columns, types, stats);

        let kmData = null;
        if (clustering.featureCount >= 2 && data.length >= 20) {
            try {
                const kCols = clustering.usable;
                if (_kmCache && _kmCache.kCols.join('\x00') === kCols.join('\x00')) {
                    kmData = _kmCache;
                } else {
                    const kRows = data.filter(row =>
                        kCols.every(c => { const v = toNum(row[c]); return !isNaN(v); })
                    );
                    if (kRows.length >= 20) {
                        const colMeans = kCols.map(c => mean(kRows.map(r => toNum(r[c]))));
                        const colStds  = kCols.map(c => std(kRows.map(r => toNum(r[c]))));
                        const step   = Math.ceil(kRows.length / 2000);
                        const sample = kRows.filter((_, i) => i % step === 0);
                        const X = sample.map(row =>
                            kCols.map((c, i) => colStds[i] > 0 ? (toNum(row[c]) - colMeans[i]) / colStds[i] : 0)
                        );
                        const maxK = Math.min(10, Math.floor(X.length / 5));
                        if (maxK >= 2) {
                            const elbowData = kMeansElbow(X, maxK);
                            const bestK     = detectElbow(elbowData.map(d => d.wcss));
                            kmData = { kCols, colMeans, colStds, elbowData, bestK };
                            _kmCache = kmData;
                        }
                    }
                }
            } catch (e) {
                console.error('[kmeans] error:', e);
            }
        }

        const pca           = plotCols.length >= 2 ? pcaVarianceHint(plotCols, corr) : null;
        const splitRec      = recommendSplit(data, target, stats);
        const featureImp    = target ? featureImportance(data, columns, types, stats, target) : [];
        const featureImpNum = featureImp.filter(f => f.type === 'numeric');
        const featureImpCat = featureImp.filter(f => f.type === 'categorical' || f.type === 'boolean');

        let dtResult = null;
        if (target) {
            try {
                const dtCols = columns.filter(c =>
                    c !== target.col &&
                    (types[c] === 'numeric' || types[c] === 'boolean' ||
                     (types[c] === 'categorical' && stats[c].unique >= 2 && stats[c].unique <= 10 && stats[c].nullPct < 0.5))
                ).slice(0, 30);
                if (dtCols.length >= 1) {
                    const allRows = data.filter(r => r[target.col] !== null && r[target.col] !== undefined && r[target.col] !== '');
                    if (allRows.length >= 20) {
                        const step2 = Math.ceil(allRows.length / 3000);
                        const sample2 = step2 > 1 ? allRows.filter((_, i) => i % step2 === 0) : allRows;
                        const root = dtBuild(sample2, dtCols, types, target.col, target.taskType);
                        const eval_ = dtEvaluate(root, sample2, target.col, target.taskType);
                        dtResult = { root, eval: eval_, importance: dtImportance(root), depth: dtDepth(root), nodeCount: dtCount(root) };
                    }
                }
            } catch(e) { console.error('DT error:', e); }
        }
        const encSummary  = encodeAbility(columns, types, stats, target);
        const imbalance  = (() => {
            if (!target || target.taskType !== 'classification') return null;
            const st    = stats[target.col];
            const total = st.total - st.nulls;
            const top   = (st.top || []).map(([v, n]) => ({ v, n, pct: n / total }));
            const max   = top[0]?.pct ?? 0;
            return { top, maxPct: max, level: max > 0.9 ? 'severe' : max > 0.7 ? 'moderate' : 'balanced' };
        })();

            }

            // K-means elbow chart
            if (kmData) {
                const { elbowData, bestK } = kmData;
                Plotly.newPlot('km-elbow', [{
                    type: 'scatter', mode: 'lines+markers',
                    x: elbowData.map(d => d.k),
                    y: elbowData.map(d => d.wcss),
                    marker: { color: elbowData.map(d => d.k === bestK ? '#6366f1' : '#d1d5db'), size: 8 },
                    line: { color: '#e5e7eb' },
                }], {
                    margin: { t: 10, r: 20, b: 40, l: 60 },
                    xaxis: { title: 'k', dtick: 1, color: '#6b7280' },
                    yaxis: { title: 'Inertia (WCSS)', color: '#6b7280' },
                    paper_bgcolor: 'white', plot_bgcolor: 'white',
                }, CFG);
                showClusterProfiles(bestK);
            }
        }, 0);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    renderUpload();

    </script>
